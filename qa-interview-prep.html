{id:'m7',icon:'🤖',title:'AI-Assisted Testing',desc:'Claude Code, Playwright MCP, GitHub Copilot, Google Antigravity in QA workflows',
topics:['AI in testing landscape — where it genuinely helps vs. hype','Claude Code for test generation and framework design','Playwright MCP: agent-based browser automation','GitHub Copilot for test code completion and refactoring','Google Antigravity for visual and exploratory testing','AI for test data generation and synthetic data','AI for requirements analysis and AC extraction','Prompt engineering for test generation quality','Risks and governance of AI-generated tests','AI-assisted defect analysis and root cause identification'],
mcqs:[
{q:'What is the MOST effective use of AI code tools (Claude Code, GitHub Copilot) in test automation?',opts:['Fully automate test creation with zero human review','Generate base test code and POM structures that a human reviews, refines, and validates — AI writes the first draft, QA engineers own the quality','Replace QA engineers entirely','Use AI only for test documentation'],ans:1,expl:'AI as a force multiplier: 70-80% of boilerplate code is AI-generated, freeing QA engineers for edge case thinking, framework design decisions, and validation. The critical discipline: every AI-generated test must be reviewed AND must be verified to fail when the feature is broken (mutation testing mindset).'},
{q:'What is Playwright MCP and how does it differ from standard Playwright scripting?',opts:['A Playwright plugin for mobile testing','An MCP (Model Context Protocol) server that allows AI agents to control a browser via natural language instructions — generating test steps from journey descriptions rather than hand-coding each action','A Playwright configuration file format','A cloud execution platform for Playwright'],ans:1,expl:'Playwright MCP turns browser automation into an agent task: you describe the user journey in natural language, the MCP server executes it against the live app, and generates code. Useful for rapid scenario exploration, generating base scripts, and accessibility testing. The output still requires human review and refactoring for production test suites.'},
{q:'What is the key risk of using AI-generated test scripts without careful human validation?',opts:['AI-generated tests are always too slow','AI-generated tests may have correct structure but weak assertions — tests that always pass regardless of application state (false positives), giving a false sense of coverage','AI tools are too expensive','AI-generated tests only work in Chrome'],ans:1,expl:'The "always-green" risk: an AI-generated test that clicks a button and asserts "the page loaded" passes even when the underlying feature is broken. Every AI-generated test must be validated with mutation testing — intentionally break the feature and confirm the test fails. If it does not fail, the assertion is insufficient.'},
{q:'How can AI tools assist in the requirements analysis phase of QA?',opts:['AI cannot help with requirements','Use Claude or ChatGPT to analyse user stories for: missing acceptance criteria, ambiguous language, untestable requirements, and to generate an initial test scenario list — saving 30-40% of test design time','AI replaces the need for acceptance criteria entirely','Only use AI for code generation'],ans:1,expl:'AI is effective at requirements analysis: parsing user stories for gaps ("what happens when the user enters an invalid amount?"), generating edge cases, identifying contradictions, and producing a first-pass test scenario list. Human QA reviews and enriches the output. This is particularly valuable for large backlogs before sprint planning.'},
{q:'What governance controls should a QA Manager implement for AI-assisted test automation?',opts:['No governance needed — AI tools are reliable','Define review checkpoints: AI-generated scripts require human review before merge, test must demonstrably fail on broken feature, assert coverage must meet minimum threshold, and AI tool usage must be logged for audit purposes','Ban AI tools from the QA process','Only senior engineers can use AI tools'],ans:1,expl:'AI governance in QA: (1) Mandatory human review before any AI-generated test is committed. (2) Failure verification — test must fail on a known broken build. (3) Coverage quality metric — not just quantity of tests. (4) Audit trail of AI-generated vs human-written tests for compliance (relevant in BFSI/Healthcare). (5) Model version tracking — AI tool updates can change output patterns.'},
{q:'You need to generate realistic test data for 10,000 investor profiles for load testing. How do AI tools help?',opts:['Manually create all 10,000 profiles','Use AI (Claude, ChatGPT, or GitHub Copilot) to generate a Python/Faker-based data generation script that produces realistic, PAN-valid, address-valid investor profiles at scale — then use this in your JMeter/K6 scripts','Use only one investor profile repeated 10,000 times','Buy test data from a vendor'],ans:1,expl:'AI accelerates test data generation scripts: describe the data model to Claude, get a Faker-based generator with realistic Indian PAN numbers, addresses, and investment amounts. Review and refine. This is far faster than manual creation and produces more realistic distributions than repeated single records — critical for catching concurrency defects.'}
],
mock:[
{q:'How have you practically integrated AI tools into your QA workflow? Give specific examples.',cat:'AI in Practice',ans:'Three concrete integrations. First, Claude Code for POM generation: I share the HTML structure of a page with Claude and ask for the Page Object class. It generates 80-90% of the class correctly — I then refine locators and add missing edge-case methods. This cut POM development time from 2 hours to 30 minutes per page. Second, Playwright MCP for exploratory script generation: for the PwC CLM project, I used Playwright MCP to record new contract creation journeys by describing steps in natural language. The generated code served as a starting scaffold that I then hardened. Third, GitHub Copilot for test data setup code: writing factory functions and fixture helpers is repetitive — Copilot completes patterns I start, particularly useful for Karate feature file data tables. Governance I enforced: every AI-generated test must fail on a broken feature before it is committed. No exceptions.'},
{q:'What are the limitations of AI in test automation that a QA Manager needs to be aware of?',cat:'AI Limitations',ans:'Five real limitations I have encountered. (1) Assertion quality: AI generates structurally correct tests but with shallow assertions — "status is 200" rather than "response matches schema AND business rule is enforced." Human expertise is needed to make assertions meaningful. (2) Domain blindness: AI does not understand that in a mutual fund platform, a transaction pending state has specific SLA rules — domain knowledge must be injected through good prompts or human review. (3) Test interdependencies: AI-generated tests often have implicit state dependencies — they assume data from a previous test. Human refactoring is needed for isolation. (4) Security blind spots: AI rarely generates security-focused assertions unless explicitly prompted. (5) Maintenance debt: AI-generated code can have unusual patterns that are hard for junior engineers to maintain. Code style guidelines must be enforced post-generation. The summary: AI is a junior QA engineer that is very fast but needs experienced supervision.'}
],
scenarios:[{

{id:'m8',icon:'🎤',title:'Behavioral & STAR Questions',desc:'Senior-level leadership stories, conflict, failure, influence and vision questions',
topics:['STAR method: Situation → Task → Action → Result (with data)','Structuring answers for senior QA Manager level','Key behavioral themes: leadership, transformation, conflict, failure, success','Questions about managing up and influencing executives','Questions about building and scaling teams','Questions about technical decisions and their business outcomes','Questions about handling ambiguity and incomplete information','Preparing 5-7 signature stories that cover multiple questions'],
mcqs:[
{q:'What does STAR stand for in behavioral interview methodology?',opts:['Skills, Training, Abilities, Results','Situation, Task, Action, Result — a framework for structuring specific examples that demonstrate competency','Strategy, Testing, Automation, Reporting','Standard Testing and Review procedure'],ans:1,expl:'STAR structures behavioral answers: Situation (context and stakes), Task (your specific responsibility), Action (what YOU specifically did — not "we"), Result (quantifiable outcome). For senior roles, the Result must include business impact metrics, not just "it went well."'},
{q:'A senior interviewer asks "Tell me about a time you failed." What is the worst response?',opts:['Describing a real failure with a learning','Saying "I cannot think of a failure" or describing a minor trivial mistake that was not really a failure','Discussing a failure that led to a process improvement','Talking about a team failure where you were accountable'],ans:1,expl:'"I cannot think of a failure" signals low self-awareness. "I work too hard" is a cliché trap. The best failure stories: real failure with genuine consequences, honest analysis of what went wrong, what you personally did differently, and how the team/organisation benefited from the learning. Senior interviewers expect scars — they are a sign of experience.'},
{q:'How long should a STAR answer be in a senior-level interview?',opts:['30 seconds','90 seconds to 2.5 minutes — enough to show depth without losing the interviewer; structure clearly with a crisp Result','5+ minutes for full detail','As long as it takes'],ans:1,expl:'90s-2.5 min is optimal: 20s situation, 20s task, 60s action (the meat), 30s result with metrics. Anything longer loses the interviewer. Anything shorter signals a lack of depth or preparation. Practice timing your stories.'},
{q:'When answering "Tell me about managing a difficult stakeholder," what must your answer demonstrate?',opts:['That you were right and the stakeholder was wrong','Empathy, data-driven communication, your ability to understand their perspective and find common ground, and the business outcome of the resolution','That you escalated immediately','That you avoided the conflict'],ans:1,expl:'Difficult stakeholder questions test: (1) Emotional maturity — you did not escalate immediately or become defensive. (2) Communication skill — you adapted your approach to their communication style and concerns. (3) Problem-solving — you found a solution that addressed their underlying need. (4) Outcome — the relationship and project both improved.'},
{q:'What makes a "Result" in a STAR answer strong?',opts:['Saying "it went well" and "the team was happy"','Quantified business outcomes: "reduced regression cycle from 5 days to 1.5 days," "achieved 80% automation coverage in 4 months," "DER dropped from 8% to 1.2% within 2 releases"','Describing what you planned to do next','Listing the tools you used'],ans:1,expl:'Strong Results: specific numbers, percentages, time reductions, cost savings, or risk metrics. Connect to business outcomes: "This directly contributed to on-time delivery of the ABMF portal with zero production-critical defects in the first 60 days." Generic outcomes ("the project was successful") are forgettable.'},
{q:'An interviewer asks: "Where do you see QA going in the next 3-5 years?" What demonstrates senior QA leader vision?',opts:['Saying "more automation"','Articulating a shift from test-and-report to embedded quality engineering: shift-left, AI-augmented testing, quality as a shared team responsibility, continuous quality in CD pipelines, and QA\'s role evolving to quality coaching and risk advisory','Saying "I am not sure, technology changes fast"','Focusing only on new tools'],ans:1,expl:'A senior QA leader articulates a vision: QA moving from gate-keeper to quality enabler, from defect detection to defect prevention, from manual/automation dichotomy to continuous quality engineering. Mention AI augmentation, BDD/shift-left, quality dashboards replacing test reports, and QA as risk management partner to the business.'}
],
mock:[
{q:'Tell me about a time you led a significant QA transformation in an organisation.',cat:'Transformation',ans:'At Impiger, when I took on the Manager role in 2022, the QA practice was primarily reactive — manual testing at the end of projects with Selenium automation at around 20% coverage and high flakiness. I led a transformation over 18 months. Situation: multiple project delays caused by late QA integration and 35-40% test failure rates due to flaky automation. Task: redesign the QA practice end-to-end. Actions: (1) Established a QA Centre of Excellence with standardised processes, templates, and a Playwright-first automation standard — retiring Selenium. (2) Created an upskilling programme for 20 manual testers on Playwright Python. (3) Introduced shift-left — QA participates in all story kickoffs and three-amigos sessions. (4) Built real-time Azure DevOps dashboards replacing weekly status emails. (5) Implemented TaaS governance model for client engagements with defined SLAs. Result: automation coverage rose from 20% to 75% across projects, flakiness rate dropped from 35% to under 3%, release cycle time reduced by 40%, and we signed 3 new TaaS contracts partly based on the QA capability story. Most importantly, QA was no longer seen as a bottleneck — it became a differentiator.'},
{q:'Describe a situation where a critical production defect was found that should have been caught in testing. How did you handle it?',cat:'Failure & Recovery',ans:'On the Sun NXT OTT platform, a DRM entitlement bug allowed certain content to play on unauthorised devices for approximately 6 hours before detection. It should have been caught in our device compatibility matrix testing. Situation: production incident with potential content piracy implications and contractual penalty risk. Task: contain the incident, understand why testing missed it, and prevent recurrence. Actions: immediately coordinated with DevOps to disable the affected entitlement endpoint. Then conducted an honest post-mortem: the bug appeared only on a specific combination of firmware version and geographic region that was not in our test matrix. We had tested the happy path but not the edge case of the newly released device firmware. I reported this transparently to the client with a full timeline, impact assessment, and remediation plan — no minimising. For prevention: expanded device matrix, introduced environment-based test data that covered firmware variants, and added a production smoke suite running every 30 minutes for DRM entitlement checks. Result: the client appreciated the transparency and the post-mortem quality. Our test matrix expansion caught 2 similar issues in the following month before they reached production.'},
{q:'Tell me about a time you had to push back on an unrealistic deadline from senior management.',cat:'Managing Up',ans:'For a major BFSI portal launch, the business committed to a go-live date that left 3 weeks for QA of a module that had just completed development — when our estimate was 5 weeks for adequate coverage including security testing. Situation: contractual go-live pressure, significant financial penalty for delay. Task: protect the product quality without being the "QA is blocking delivery" story. Actions: I prepared a risk-quantified analysis rather than just saying "we need more time." I showed: (1) What 3 weeks of testing would cover vs. what would be untested. (2) Historical data: similar coverage gaps in past releases correlated with production defect rates 4x higher. (3) Three options with trade-offs. (4) My recommendation: 4-week timeline with scope adjustment — exclude 2 low-risk non-financial modules from scope, defer their full testing to a post-go-live sprint. I presented this to the project director and client together, with risk acceptance documented for the recommended option. Result: the director approved the 4-week option. We launched with the reduced scope, zero production defects in financial transaction flows in the first month, and the deferred modules were successfully delivered 3 weeks post-launch. Key lesson: come with options and data, never just "no."'},
{q:'How do you stay current with QA trends and continue your professional development while managing a large team?',cat:'Growth',ans:'I structure this in three ways. First, deliberate learning: I set aside 3-4 hours per week — I hold this time on my calendar like a meeting. I used this time to earn my ISTQB AI Testing certification and to build hands-on skills with Playwright MCP and Claude Code, which I then introduced to the team. Second, learning through the team: when I assign automation engineers to evaluate a new tool, I do the evaluation myself first in a small POC, then review their findings — staying technically credible. Third, community and peer learning: I follow the Ministry of Testing community, participate in QA leadership forums, and specifically track AI-in-testing developments which are moving extremely fast. My personal rule: if I am recommending a tool or practice to my team, I need to have used it on at least a small real problem myself. I cannot effectively coach what I have not practised.'},
{q:'Describe your leadership style and how it has evolved over your 16 years in QA.',cat:'Leadership Philosophy',ans:'My style has evolved from "expert contributor" to what I would call "quality architect." Early in my career, I led by knowing more than anyone else in the room — I was the automation expert, the go-to person for technical decisions. That works to about team-lead level. As I moved into management, I learned that scale requires a different approach. Now I lead through three principles. First, build capability, not dependency — my goal is that the team can operate without me for a sprint. If they cannot, I have a dependency problem. Second, data over opinion — any significant QA decision should have supporting metrics or a documented rationale. This protects the team from politics and keeps discussions objective. Third, make quality everyone\'s job — my definition of success is a development team that considers testability in every design decision, not a QA team that catches problems at the end. The evolution was humbling: letting go of being the smartest person in the room and instead becoming the person who creates the environment where the team collectively outperforms anything I could do alone.'}
],

{id:'m9',icon:'🗄️',title:'Database Testing',desc:'SQL queries, data integrity, stored procedures, DB performance & migration testing',
topics:['Database testing types: structural, functional, non-functional','SQL for testers: SELECT, JOIN, subqueries, aggregates','Data integrity validation: PK, FK, constraints, cascades','Stored procedure and trigger testing','ETL pipeline testing: source-to-target mapping, transformation rules','Database migration testing: schema changes, data migration validation','Performance testing: query execution plans, indexing, slow queries','NoSQL testing concepts: MongoDB, Redis — what differs from RDBMS','Test data management: masking, synthetic data, referential integrity','ACID properties and transaction testing','DB security testing: SQL injection, privilege escalation, audit logs','Oracle, PostgreSQL, SQL Server — key differences for a tester'],
mcqs:[
{q:'What is the primary difference between black-box and white-box database testing?',opts:['Black-box tests only UI; white-box tests only APIs','Black-box database testing validates data outcomes from the application layer without SQL knowledge; white-box testing directly queries the DB to verify internal data states, constraints, and stored logic','Black-box is automated; white-box is manual','There is no meaningful difference'],ans:1,expl:'Black-box DB testing: submit data through the UI/API and verify the correct values appear in the UI response. White-box DB testing: write SQL to directly validate the correct rows, columns, and relationships were persisted, constraints enforced, and stored procedures behaved correctly. Both are necessary — UI validation misses DB-level anomalies.'},
{q:'You need to verify that deleting an investor record cascades correctly to their transactions. Which SQL query validates this?',opts:['SELECT * FROM investors','SELECT t.* FROM transactions t LEFT JOIN investors i ON t.investor_id = i.id WHERE i.id IS NULL — verifying orphan transactions do not exist after delete','DELETE FROM investors and check UI','Only test via the application, not SQL'],ans:1,expl:'After deleting an investor, a LEFT JOIN that returns NULL for the investor side confirms no orphan transaction records remain. This validates ON DELETE CASCADE is working. Extend this pattern to all child tables: portfolio_holdings, documents, KYC records. Direct SQL verification is faster and more reliable than UI-based checks for referential integrity.'},
{q:'What are ACID properties and why do they matter for BFSI database testing?',opts:['Automated CI Integration Design — a DevOps concept','Atomicity, Consistency, Isolation, Durability — guarantees that DB transactions are all-or-nothing, maintain valid state, do not interfere with each other, and survive failures. Critical for financial transactions where partial commits cause data corruption','A type of database index','ACID only applies to NoSQL databases'],ans:1,expl:'For a mutual fund platform: Atomicity — a purchase transaction must debit the investor and credit the fund together or not at all. Consistency — account balances must always balance. Isolation — concurrent transactions must not produce dirty reads (investor sees mid-transaction state). Durability — once committed, a transaction survives a crash. Test each: inject failures mid-transaction, run concurrent transactions, verify data after simulated crashes.'},
{q:'How do you test an ETL pipeline for a BFSI reporting system?',opts:['Run the pipeline and check if it completes without error','Validate source-to-target row counts, compare transformed field values against mapping rules, check for null/default substitutions, verify rejected records in the error log, and run reconciliation totals (sum of amounts source vs target)','Only check the target database has data','Run a UI report and see if numbers look right'],ans:1,expl:'ETL testing checklist: (1) Row count reconciliation — every source row accounted for. (2) Field-level mapping — each transformation rule verified with specific test data covering edge cases (nulls, max values, special chars). (3) Data type and format validation. (4) Rejected records — intentional bad data should land in error tables with correct reason codes. (5) Business totals — sum(amount) source must equal sum(amount) target. (6) Incremental load — re-running should not duplicate records.'},
{q:'During database migration testing for a schema change (adding a NOT NULL column), what is the MOST critical test?',opts:['Test that the new column appears in the UI','Test that existing data rows have a valid default populated (not null violations), new inserts respect the constraint, application code handles the new column without errors, and rollback restores the previous schema state','Only test new records after migration','Check that the migration script ran without error messages'],ans:1,expl:'NOT NULL column migration risks: (1) Existing rows — what default was applied? Is it correct per business rules? (2) Application code — does it now send the new field, or does it fail with a constraint violation? (3) Rollback — can you reverse the migration cleanly if a defect is found post-deploy? (4) Performance — on a 50M-row table, the migration itself may lock the table. Test in staging with production-volume data first.'},
{q:'How do you identify a slow database query that is causing API response time degradation?',opts:['Guess which query is slow and optimise it','Enable slow query logging in the DB, capture the execution plan (EXPLAIN/EXPLAIN ANALYZE), identify full table scans vs index seeks, check for missing indexes on JOIN and WHERE columns, and measure improvement after index creation','Add more server RAM','Rewrite all queries from scratch'],ans:1,expl:'Systematic query optimisation: (1) Slow query log identifies queries above a threshold (e.g. >1s). (2) EXPLAIN ANALYZE shows the execution plan — look for Seq Scan on large tables (bad) vs Index Scan (good). (3) Check index coverage on WHERE, JOIN ON, and ORDER BY columns. (4) Measure before/after with EXPLAIN ANALYZE timing. For BFSI portfolio queries joining investors × holdings × NAV history, missing composite indexes commonly cause 10-100x degradation at scale.'},
{q:'What is the difference between testing a stored procedure and testing a regular SQL query?',opts:['There is no difference','Stored procedures have business logic, branching, exception handling, and transaction management embedded in the DB — testing requires: calling the procedure with boundary/invalid inputs, verifying output parameters and return values, confirming transaction rollback on exceptions, and checking side effects on all affected tables','Stored procedures cannot be tested directly','Only the DBA should test stored procedures'],ans:1,expl:'Stored procedure testing scope: (1) Valid inputs — verify correct transformation and output. (2) Boundary values — zero amounts, max values, negative numbers. (3) Invalid inputs — what does the procedure do with nulls or out-of-range values? (4) Exception paths — does it ROLLBACK correctly on error? (5) Side effects — which tables does it touch and in what state? Use a transaction wrapper in tests so you can ROLLBACK test data after each test run.'},
{q:'How do you test data masking in a BFSI system where production data is used in staging?',opts:['Trust that masking was configured correctly and skip testing','Verify that PII fields (PAN, Aadhaar, mobile, email, account number) are masked in staging using specific test queries, that masked values maintain format validity (PAN format still valid), that masked data cannot be reverse-engineered, and that referential integrity is maintained across masked tables','Only check 5 random records','Ask the DBA to confirm masking is enabled'],ans:1,expl:'Data masking test checklist: (1) Query each PII column — no production values should appear. (2) Format validity — a masked PAN should still match the PAN regex pattern so application validation does not break. (3) Referential integrity — investor_id masked consistently across all tables (same masked ID everywhere). (4) Irreversibility — confirm masked values cannot be decoded. (5) Completeness — all tables containing PII are masked, not just the primary investor table. Regulatory requirement in BFSI — failure is a compliance violation.'}
],
mock:[
{q:'Walk me through how you approach database testing for a BFSI application like ABMF.',cat:'DB Test Strategy',ans:'Database testing for ABMF was structured in four layers. First, schema validation — before any functional testing, I ran automated checks on every table: column names, data types, NOT NULL constraints, PK/FK relationships, and index existence all matched the approved schema document. I used a Python script querying information_schema to diff the actual schema against expected. Second, data integrity testing — for every application workflow (investor creation, purchase, redemption), I wrote SQL validation queries that ran post-action to verify the correct rows were created, updated, or soft-deleted, with correct values and no orphan records. Third, stored procedure testing — ABMF had 15+ stored procedures for NAV calculations, statement generation, and compliance reporting. I tested each directly via EXEC calls with a test data wrapper that rolled back after each test. Fourth, ETL validation for the regulatory reporting pipeline — row count reconciliation, field-level spot checks, and sum reconciliation of transaction amounts source vs target. My SQL test suite ran as a post-deployment step in the Azure DevOps pipeline, giving us DB-level confidence after every release.'},
{q:'How do you handle test data for database testing in a regulated BFSI environment?',cat:'Test Data',ans:'Three-layer approach. Layer 1 — synthetic data generation: I use Python Faker with custom providers for BFSI-specific fields — PAN numbers (ABCDE1234F format), IFSC codes, scheme codes, NAV values — to generate realistic but entirely synthetic investor and transaction datasets. This covers 80% of test scenarios. Layer 2 — masked production data: for complex scenarios that need realistic data distributions (e.g., portfolio aggregation with 10,000 holdings), I work with the DBA to apply column-level masking to a production snapshot. I then validate the masking: PII columns queried directly should show only masked values, format validity confirmed, cross-table referential consistency verified. Layer 3 — golden dataset: a curated, hand-crafted set of ~50 investors with known data states (specific balances, transaction histories, edge cases) that serve as stable regression test data. This golden dataset is version-controlled in the repo, seeded via API before the test run, and torn down after. The key discipline: no direct test-data manipulation via SQL in tests — all setup goes through the application API so the data is in a valid state the application itself created.'},
{q:'Describe a database bug you found that would have been missed by UI testing alone.',cat:'Real Example',ans:'On the ABMF mutual fund portal, a redemption workflow appeared to work correctly in the UI — confirmation page showed, email was sent, the investor saw "Redemption Submitted." But my post-action SQL validation query revealed the transaction record had been created with transaction_type = NULL instead of "REDEMPTION". The stored procedure had a parameter defaulting to NULL when the application passed an unexpected enum value after a recent code refactor. The UI had no visibility into this — it was reading from a response object the API constructed before the DB write completed. In production, this would have caused the overnight NAV settlement batch to skip these transactions entirely — investors would not have received their redemption proceeds. The fix was straightforward (correct the enum mapping), but detection required white-box DB testing. This case became the justification for making SQL post-action validation mandatory in our test pipeline.'}
],
scenarios:[{
title:'Data Corruption Found in Production: Transaction Amounts Mismatch',
setup:'Three weeks after a BFSI portal go-live, the finance team reports that 127 transaction records in the transactions table have amounts that do not match what investors were shown in their confirmation emails. The discrepancy is between 0.01% and 2% of the transaction value — consistent with a floating-point rounding issue. You were the QA lead.',
criteria:['Immediate triage: quantify scope — how many records, which date range, total financial exposure','Identify the root cause: floating point vs decimal type, rounding point in the calculation chain','Assess whether this is a data issue (fix the 127 records) or a live code issue (producing new corrupt records)','Coordinate a safe data fix with documented before/after values and approval process','Determine what testing missed this and why','Propose the specific test cases that would have caught it','Establish monitoring to detect future occurrences'],
ideal:'Run a reconciliation query: SELECT id, amount, confirmed_amount, ABS(amount - confirmed_amount) as delta FROM transactions WHERE delta > 0. Categorise by delta size and date. Cross-reference with the deployment date to confirm it started post-go-live. Root cause: floating-point FLOAT column vs DECIMAL(18,4) — the difference matters at scale. Live code issue (new transactions also affected) vs data-only issue. Immediate: switch code to DECIMAL type and deploy. Data fix: DBA-executed UPDATE with each record logged before/after, approved by finance lead and tech director. What testing missed: no boundary-value SQL validation of stored amounts post-transaction, and no cross-column reconciliation test (UI confirmation amount vs DB stored amount). Add to test suite: post-transaction SQL assertion confirming DB amount matches API response amount to 4 decimal places.'
}],
codeChallenge:[{
title:'SQL Validation Queries for BFSI Transaction Testing',
desc:'Write SQL queries to: (1) validate no orphan transactions exist after investor deletion, (2) verify transaction amounts match to 4 decimal places across tables, (3) find duplicate transactions within a 5-minute window for the same investor.',
hints:['Use LEFT JOIN ... WHERE IS NULL for orphan detection','Use ABS(a - b) < 0.00005 for decimal comparison (not =)','Use a self-join or window function for duplicate detection','Include the time window in the duplicate check using INTERVAL or DATEADD'],
solution:`-- 1. Orphan transaction detection (investors deleted without cascade)
SELECT t.id, t.investor_id, t.amount, t.created_at
FROM   transactions t
LEFT   JOIN investors i ON t.investor_id = i.id
WHERE  i.id IS NULL;
-- Should return 0 rows — any rows = referential integrity failure

-- 2. Amount reconciliation: transactions vs audit_log
SELECT
  t.id,
  t.amount           AS transactions_amount,
  al.amount          AS audit_amount,
  ABS(t.amount - al.amount) AS delta
FROM   transactions t
JOIN   audit_log al ON al.reference_id = t.id
                    AND al.event_type = 'TRANSACTION_CREATED'
WHERE  ABS(t.amount - al.amount) > 0.00005;
-- Non-zero delta = rounding bug or data corruption

-- 3. Duplicate transaction detection (same investor, same amount, within 5 min)
SELECT
  a.id        AS txn1_id,
  b.id        AS txn2_id,
  a.investor_id,
  a.amount,
  a.scheme_code,
  a.created_at AS txn1_time,
  b.created_at AS txn2_time
FROM   transactions a
JOIN   transactions b
       ON  a.investor_id  = b.investor_id
       AND a.amount       = b.amount
       AND a.scheme_code  = b.scheme_code
       AND a.id           < b.id   -- avoid self-match and reverse duplicates
       AND b.created_at BETWEEN a.created_at
                             AND a.created_at + INTERVAL '5 minutes';
-- Any rows = potential double-submission defect`,
expl:'Key patterns: (1) LEFT JOIN / IS NULL is the canonical orphan-detection pattern — faster than NOT IN on large tables. (2) ABS(delta) > threshold for float/decimal comparison — never use = for amounts. (3) Self-join with id < id avoids row pairing with itself and counting each pair twice. (4) INTERVAL-based time window targets the double-submission window. These three queries should be in every BFSI test pipeline as post-deployment smoke checks.'}
]}
];

{id:'l1',icon:'📐',title:'Testing Fundamentals & Taxonomy',
summary:'Core testing theory interviewers use to probe senior candidates.',
notes:[
{h:'Test Types vs Test Levels',b:'Types (what you test): Functional, Non-functional, Structural, Regression, Confirmation. Levels (when you test): Unit → Integration → System → Acceptance. Confusing these is a common trap — "regression testing" is a type that can occur at any level.'},
{h:'Verification vs Validation',b:'Verification: are we building the product right? (reviews, inspections, static analysis — no code executed). Validation: are we building the right product? (dynamic testing — code executed). Both are required. QA Managers own both.'},
{h:'Test Basis & Traceability',b:'Test basis = the artefact tests are derived from: requirements, design docs, user stories, code. Traceability matrix maps test cases ↔ requirements. Critical for BFSI audits — regulators ask "which test covers requirement X?"'},
{h:'Quality Attributes (ISO 25010)',b:'Functional Suitability, Performance Efficiency, Compatibility, Usability, Reliability, Security, Maintainability, Portability. A test strategy addresses each relevant attribute, not just functional correctness.'},
{h:'Defect Taxonomy',b:'Defect severity (impact on system): Critical/High/Medium/Low. Priority (urgency of fix): P1/P2/P3/P4. A cosmetic defect on a compliance page may be Low severity but P1 priority. Confusing these causes stakeholder friction.'}
],

{id:'l2',icon:'🎭',title:'Advanced Playwright Patterns',
summary:'Anti-patterns, debugging, tracing, and production-grade framework design.',
notes:[
{h:'The 5 Locator Anti-Patterns',b:'(1) XPath from root (/html/body/div[3]...) — breaks on any DOM change. (2) CSS class names (.btn-blue) — styling classes change in refactors. (3) Index-based ([nth-child(2)]) — fragile when order changes. (4) Text that changes with i18n. (5) data-cy only without semantic fallback. Use: get_by_role → get_by_label → data-testid.'},
{h:'Playwright Tracing for CI Debugging',b:'Enable with --tracing=retain-on-failure in CI. playwright show-trace trace.zip opens a full timeline: network requests, DOM snapshots, console logs at every action. Eliminates "works locally, fails CI" mystery investigations.'},
{h:'Test Isolation Checklist',b:'Each test must: (1) create its own data via API, (2) use function-scoped page fixture, (3) not depend on previous test state, (4) clean up in a yield fixture teardown. Tests that share state are the #1 cause of order-dependent failures.'},
{h:'Soft Assertions',b:'expect.soft() collects all assertion failures instead of stopping at the first. Use on pages with multiple independent validations (e.g., dashboard metrics) — get the full picture in one run rather than fix-run-fix-run cycles.'},
{h:'Browser Context vs Page',b:'Context = an isolated browser session (own cookies, localStorage, auth state). Page = a tab within a context. For multi-user scenarios (e.g., admin approves investor action), create two contexts — one per user role — within the same test.'}
],
aiContext:'You are an expert Playwright Python instructor. The learner is a senior QA engineer who uses Playwright with Python and pytest daily. Give concrete code examples and focus on production-grade patterns, not toy examples.'},

{id:'l3',icon:'🔌',title:'API & Contract Testing',
summary:'REST fundamentals, consumer-driven contracts with Pact, and GraphQL testing.',
notes:[
{h:'REST API Testing Checklist',b:'For every endpoint test: status code, response schema (all fields, types), business rule validation (amounts correct, status transitions valid), auth boundary (unauthenticated → 401, wrong role → 403), error response structure (errorCode, message), and response time baseline.'},
{h:'Consumer-Driven Contract Testing (Pact)',b:'Consumer defines what it expects from the provider (request shape + response shape). Provider verifies it can fulfil every consumer contract. Runs in CI — provider build fails if it breaks a consumer contract. Eliminates "the API changed and nobody told us" incidents in microservices.'},
{h:'Pact vs WireMock vs Postman Mocks',b:'Pact: contract is shared and verified by both sides — true contract testing. WireMock/Postman mocks: consumer tests against a mock that nobody verifies against the real provider — false confidence. Use Pact when you own both consumer and provider. Use WireMock for third-party APIs you cannot control.'},
{h:'GraphQL Testing Differences',b:'No fixed endpoints — test the schema (introspection), not URLs. Test query depth limits (DoS protection), field-level auth (can user A query user B\'s data via nested fields?), and N+1 query performance. Use introspection to auto-generate schema tests.'},
{h:'API Security Test Checklist',b:'IDOR (substitute another user\'s ID), auth bypass (missing token still returns data?), mass assignment (send unexpected fields in POST body), rate limiting (100 rapid requests — throttled?), sensitive data in responses (are PAN/Aadhaar masked?).'}
],
aiContext:'You are an API testing expert. The learner is a senior QA Manager with Postman, Newman, and Karate DSL experience, now learning contract testing with Pact. Connect concepts to microservices architectures in BFSI/fintech.'},

{id:'l4',icon:'⚡',title:'Performance Testing Strategy',
summary:'Load models, thresholds, bottleneck analysis, and CI integration.',
notes:[
{h:'The 5 Performance Test Types',b:'Load: validate SLAs at expected peak. Stress: find the breaking point. Soak/Endurance: detect memory leaks at sustained load. Spike: sudden 10x traffic surge (market events). Scalability: linear capacity planning (2x users = 2x infra?). Each answers a different business question.'},
{h:'Meaningful Thresholds',b:'Never use average response time — it hides tail latency. Use p95 and p99. For BFSI: p95 < 2s for transactions, p99 < 5s, error rate < 0.1%. Set thresholds in K6 options so the test auto-fails if SLAs are breached — CI integration without manual analysis.'},
{h:'Bottleneck Localisation',b:'Response time degradation → check in order: (1) Application server CPU/memory (APM), (2) DB slow query log (missing index, lock contention), (3) External API latency (third-party calls), (4) Network (bandwidth, DNS). Each layer has its own tool. Never guess.'},
{h:'Realistic Load Model',b:'Use production traffic patterns, not uniform load. A mutual fund portal has peaks at market open (9:15 AM IST) and close (3:30 PM IST). Model think time (sleep between requests). Distribute across user types (60% view portfolio, 30% transact, 10% admin). Uniform hammering of one endpoint is not a realistic test.'},
{h:'Performance in CI',b:'Run a performance regression baseline on every staging deploy: same K6 script, compare p95 to previous run. Alert if p95 degrades by >20%. Catch performance regressions before they reach production — not during load testing weeks before release.'}
],
aiContext:'You are a performance testing expert with deep JMeter and K6 experience. The learner is a QA Manager who has run load tests for BFSI platforms handling 10,000+ concurrent users. Focus on strategy, interpretation, and CI integration.'},

{id:'l5',icon:'🔒',title:'Security Testing for BFSI',
summary:'OWASP Top 10, VAPT methodology, and regulatory security requirements.',
notes:[
{h:'OWASP Top 10 (2021) — BFSI Priority Order',b:'A01 Broken Access Control (IDOR on investor data = regulatory breach), A02 Cryptographic Failures (unencrypted PII in transit/rest), A03 Injection (SQL/NoSQL injection in search/filter endpoints), A07 Auth Failures (session fixation, weak tokens), A08 Software Integrity Failures (supply chain — npm packages). Know all 10 but these 5 are highest risk in financial platforms.'},
{h:'VAPT Methodology',b:'(1) Reconnaissance: map all endpoints via Swagger, Burp spider, JS source. (2) Automated scan: OWASP ZAP baseline — quick wins, security headers, known CVEs. (3) Manual testing: Burp Suite — auth flows, IDOR, business logic flaws that scanners miss. (4) Exploitation attempt: PoC only, never destructive. (5) Report: CVSS-scored findings with PoC evidence and remediation steps.'},
{h:'Business Logic vs Technical Vulnerabilities',b:'Automated scanners find technical issues (XSS, SQLi, missing headers). Business logic flaws require human testing: can an investor redeem more than their balance? Can a distributor approve their own KYC? Can a transaction be submitted twice (double-spend)? These are the most dangerous and scanner-invisible bugs.'},
{h:'BFSI Regulatory Security Requirements',b:'RBI guidelines: data localisation, encryption at rest (AES-256), TLS 1.2+, MFA for admin access, audit logs with tamper detection, annual VAPT by CERT-In empanelled agency. PCI-DSS: if handling card payments. Know which regulation applies to which client — this comes up in interviews.'},
{h:'Security Testing in CI/CD',b:'ZAP Baseline Scan in the pipeline: runs in seconds, catches header issues, known CVEs. SAST (SonarQube, Semgrep) on every PR: catches SQL injection patterns, hardcoded secrets. Dependency scanning (Snyk, OWASP Dependency-Check) on every build. Manual VAPT quarterly or before major releases.'}
],
aiContext:'You are a security testing expert specialising in BFSI applications. The learner is a QA Manager who has conducted VAPT for regulated financial platforms in India. Connect to RBI/PCI-DSS compliance requirements and give actionable testing steps.'},

{id:'l6',icon:'🔄',title:'CI/CD Pipeline Design for QA',
summary:'Quality gate architecture, shift-left implementation, and pipeline optimisation.',
notes:[
{h:'The 4-Stage Quality Gate Model',b:'Stage 1 — PR gate (<5 min): unit tests, linting, SAST, coverage threshold. Stage 2 — Post-merge/dev (<15 min): smoke suite, API contract tests, integration tests. Stage 3 — Staging (nightly + on-demand): full regression, security baseline, perf regression. Stage 4 — Pre-prod gate: manual exploratory sign-off, release checklist, named approver required. Each stage has a clear pass/fail criterion.'},
{h:'Test Categorisation with Markers',b:'pytest markers: @pytest.mark.smoke (50 tests, 8 min), @pytest.mark.regression (500 tests, 45 min with parallelism), @pytest.mark.security, @pytest.mark.performance. PR pipelines run smoke only. Nightly runs full regression. On-demand runs security. Reduces CI friction while maintaining coverage.'},
{h:'Parallelism Strategy',b:'pytest-xdist with -n auto uses all available CPU cores. Azure DevOps: use parallel jobs with test sharding (--shard N/M). Ensure tests are isolated (no shared state, no port conflicts). A 500-test suite at 45 min serial → 12 min with 4 parallel workers. This is the fastest ROI for slow CI.'},
{h:'Flakiness Management',b:'Target: <2% flakiness rate. Measure: track pass/fail history per test in your CI system. Quarantine strategy: flaky tests go to a @quarantine mark, run separately, not blocking the main pipeline. Fix root cause within one sprint. A 5% flakiness rate means developers stop trusting the pipeline — they bypass it.'},
{h:'Shift-Left Checkpoints',b:'Requirements phase: QA reviews stories for testability before refinement. Design phase: QA in architecture reviews to flag untestable designs. Development phase: test cases written alongside code (not after). PR phase: automated checks before merge. Each earlier checkpoint reduces the cost of defect detection by ~10x.'}
],
aiContext:'You are a DevOps and CI/CD expert specialising in test automation pipelines. The learner is a QA Manager who uses Azure DevOps, Playwright, and pytest. Focus on practical pipeline architecture and real-world optimisation strategies.'},

{id:'l7',icon:'🏦',title:'BFSI Domain & Compliance Testing',
summary:'Mutual funds, KYC, regulatory requirements, and audit-readiness for Indian BFSI.',
notes:[
{h:'Mutual Fund Transaction Flows',b:'Purchase: investor → AMC order book → NAV allocation → unit credit → confirmation. Redemption: request → lock-in check → NAV application (next business day) → unit debit → payout T+3. STP/SWP: systematic plans with date-based triggers. Each step has testable state transitions and failure modes.'},
{h:'KYC Testing Requirements',b:'KYC flow tests: valid CKYC fetch (PAN → CKYC registry → pre-fill), video KYC session (connectivity, face match, document capture), re-KYC triggers (dormant accounts, address change), KYC rejection flow (rejection reason, appeal path). Test with: valid PAN, invalid PAN, NRI PAN, minor investor PAN — each has different rules.'},
{h:'RBI/SEBI Compliance Test Areas',b:'Data localisation: PII stored only on Indian servers — validate via network trace and DB server location. Audit trail: every state change logged with timestamp, user, IP — test that logs are immutable. Transaction limits: SEBI-mandated per-transaction and daily limits — boundary value tests. Cooling period: redemption restrictions after large purchases.'},
{h:'Regulatory Reporting Testing',b:'Reports for AMFI, RBI, SEBI have mandated formats. Test: correct file format (XML/JSON/fixed-width), all mandatory fields present, values reconcile with transaction DB, generation is idempotent (same report for same period), file delivery to regulator portal succeeds. Errors in regulatory reports = fines + license risk.'},
{h:'BFSI Test Data Constraints',b:'Cannot use real investor PAN/Aadhaar in testing. Synthetic data must: pass format validation (PAN regex, Aadhaar Verhoeff checksum), be flagged as test data in the system (test investor flag), be excluded from regulatory reports, and be cleaned up before production migration. This requires a dedicated test data management strategy.'}
],
aiContext:'You are a BFSI domain expert and QA specialist with deep knowledge of Indian financial regulations (RBI, SEBI, AMFI guidelines). The learner is a QA Manager who has worked on mutual fund platforms (ABMF-style). Be precise about regulatory requirements.'},

{id:'l8',icon:'🏃',title:'Agile QA — BDD, 3 Amigos, Shift-Left',
summary:'Embedding quality into agile ceremonies, BDD with Gherkin, and sprint QA practices.',
notes:[
{h:'Three Amigos Session Structure',b:'Participants: BA (what), Dev (how), QA (what could go wrong). Duration: 20-30 min per story. QA\'s job: surface edge cases ("what if the investor\'s PAN has a special character?"), confirm acceptance criteria are testable, agree on scenarios that define "done." Output: refined AC, initial test scenario list. Run before every story enters the sprint.'},
{h:'BDD with Gherkin — What It Actually Means',b:'BDD is about collaboration, not the Gherkin syntax. The scenario writing process forces BA, Dev, and QA to agree on concrete examples before coding starts. Feature files are living documentation. Anti-pattern: writing Gherkin after the fact to describe what was built — this misses the entire benefit.'},
{h:'Definition of Done — QA Perspective',b:'Story is Done when: (1) All acceptance criteria pass, (2) Automation coverage updated (new test added or existing test updated), (3) No open Sev1/Sev2 defects, (4) Exploratory session completed (15-20 min time-boxed), (5) Performance impact assessed if applicable, (6) Peer reviewed by another QA. Stories that are "95% done" are not done.'},
{h:'Sprint QA Anti-Patterns to Call Out',b:'(1) Testing bunched at end of sprint — devs finish day 8, QA has 2 days. Fix: parallel working from day 1. (2) QA not in refinement — untestable stories discovered in testing. Fix: Three Amigos mandatory. (3) Automation "later" — manual tests pile up. Fix: automation is part of the story definition of done. (4) QA as gate — QA signs off each story. Fix: shared quality ownership.'},
{h:'Measuring Agile QA Health',b:'Metrics per sprint: (1) Stories with defects found in QA vs in sprint (escaped defects). (2) Stories failing QA first time (quality of dev handoff). (3) Automation coverage delta (growing or shrinking?). (4) Sprint completion rate (is QA the constraint?). Share these in retrospectives — data drives process improvement.'}
],
aiContext:'You are an Agile QA coach specialising in helping QA teams move from traditional gate-keeping to embedded quality engineering. The learner is a QA Manager transitioning teams to agile practices. Focus on practical, implementable advice.'},

{id:'l9',icon:'🗄️',title:'Database Testing Deep Dive',
summary:'SQL for testers, data integrity, ETL validation, and DB performance testing.',
notes:[
{h:'Essential SQL Patterns for Testers',b:'Orphan detection: LEFT JOIN ... WHERE child.fk IS NULL. Duplicate detection: GROUP BY key_columns HAVING COUNT(*) > 1. Data reconciliation: SUM/COUNT comparison between source and target tables. State transition validation: WHERE status NOT IN (valid_states). These 4 patterns cover 80% of DB test scenarios.'},
{h:'ACID Testing Techniques',b:'Atomicity: start transaction, execute half, kill the connection — verify no partial data committed. Consistency: insert data violating a constraint — verify rejection. Isolation: run two concurrent transactions against the same row — verify dirty read does not occur (use READ COMMITTED). Durability: commit a transaction, simulate DB restart — verify data persists.'},
{h:'ETL Testing Checklist',b:'(1) Row count: source COUNT = target COUNT (after filters). (2) Field mapping: spot-check 10 records across all transformed columns. (3) Null handling: source NULLs → correct default or rejection. (4) Duplicate handling: does re-running the ETL duplicate records? (5) Rejected records: bad data in error table with reason code. (6) Business totals: SUM(amount) source = SUM(amount) target.'},
{h:'Query Performance Testing',b:'Baseline query with EXPLAIN ANALYZE before and after data volume increases. Key metrics: execution time, rows scanned, sequential vs index scan. A query that takes 50ms at 10K rows may take 50s at 10M rows without the right index. Performance test the DB queries with production-volume data in staging before release.'},
{h:'Database Migration Testing',b:'Pre-migration: snapshot row counts and checksums per table. Run migration in staging with production-volume data copy. Post-migration: compare row counts, spot-check data values, run application smoke tests, verify stored procedures compile and execute correctly. Rollback test: run rollback script, verify return to pre-migration state. Never skip rollback testing.'}
],
aiContext:'You are a database testing expert with deep SQL knowledge across PostgreSQL, Oracle, and SQL Server. The learner is a QA Manager who writes SQL for test validation but wants to deepen database testing skills for BFSI platforms. Be technical and precise.'}

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = { view: 'dashboard', mid: null, tab: 'topics', quizIdx: 0, quizAns: {}, quizDone: false };
let progress = loadProgress();

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('qaprep_progress') || '{}'); } catch(e) { return {}; }
}
function saveProgress() { localStorage.setItem('qaprep_progress', JSON.stringify(progress)); }

function getModuleProgress(mid) {
  const m = ALL_MODULES.find(x => x.id === mid);
  if (!m) return 0;
  const p = progress[mid] || {};
  let total = 0, done = 0;
  if (m.mcqs?.length)          { total += m.mcqs.length;         done += Object.keys(p.mcq || {}).length; }
  if (m.mock?.length)          { total += m.mock.length;         done += Object.keys(p.mock || {}).length; }
  if (m.scenarios?.length)     { total += m.scenarios.length;    done += Object.keys(p.sc || {}).length; }
  if (m.codeChallenge?.length) { total += m.codeChallenge.length;done += Object.keys(p.code || {}).length; }
  return total === 0 ? 0 : Math.round((done / total) * 100);
}

function getOverallProgress() {
  const pcts = ALL_MODULES.map(m => getModuleProgress(m.id));
  return Math.round(pcts.reduce((a, b) => a + b, 0) / pcts.length);
}

function markMCQ(mid, idx, ans) {
  if (!progress[mid]) progress[mid] = {};
  if (!progress[mid].mcq) progress[mid].mcq = {};
  progress[mid].mcq[idx] = ans;
  saveProgress();
  updateSidebar();
}
function markMock(mid, idx, rating) {
  if (!progress[mid]) progress[mid] = {};
  if (!progress[mid].mock) progress[mid].mock = {};
  progress[mid].mock[idx] = rating;
  saveProgress();
  updateSidebar();
}
function markScenario(mid, idx) {
  if (!progress[mid]) progress[mid] = {};
  if (!progress[mid].sc) progress[mid].sc = {};
  progress[mid].sc[idx] = true;
  saveProgress();
  updateSidebar();
}
function markCode(mid, idx) {
  if (!progress[mid]) progress[mid] = {};
  if (!progress[mid].code) progress[mid].code = {};
  progress[mid].code[idx] = true;
  saveProgress();
  updateSidebar();
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function navigate(view, mid) {
  state = { view, mid: mid || null, tab: 'topics', quizIdx: 0, quizAns: {}, quizDone: false };
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (view === 'dashboard')    document.getElementById('nav-dashboard')?.classList.add('active');
  else if (view === 'learnhub') document.getElementById('nav-learnhub')?.classList.add('active');
  else if (view === 'learntopic') document.getElementById('nav-learn-' + mid)?.classList.add('active');
  else if (view === 'settings')  document.getElementById('nav-settings')?.classList.add('active');
  else document.getElementById('nav-' + mid)?.classList.add('active');
  render();
}

function switchTab(tab) {
  state.tab = tab;
  if (tab === 'mcq') { state.quizIdx = 0; state.quizAns = {}; state.quizDone = false; }
  render();
}

// ─── UPDATE SIDEBAR ──────────────────────────────────────────────────────────
function updateSidebar() {
  const overall = getOverallProgress();
  const dashoffset = 239 - (239 * overall / 100);
  document.getElementById('ring-circle').style.strokeDashoffset = dashoffset;
  document.getElementById('ring-circle').style.stroke = overall >= 80 ? '#16a34a' : '#2563eb';
  document.getElementById('ring-pct').textContent = overall + '%';
  const badge = document.getElementById('ready-badge');
  if (badge) badge.style.display = overall >= 80 ? 'block' : 'none';
  ALL_MODULES.forEach(m => {
    const el = document.getElementById('nav-pct-' + m.id);
    if (el) el.textContent = getModuleProgress(m.id) + '%';
  });
}

function buildSidebar() {
  const navMod = document.getElementById('nav-modules');
  navMod.innerHTML = ALL_MODULES.map(m => `
    <button class="nav-btn" id="nav-${m.id}" onclick="navigate('module','${m.id}')">
      <span class="ico">${m.icon}</span>
      <span class="ttl">${m.title}</span>
      <span class="pct" id="nav-pct-${m.id}">0%</span>
    </button>`).join('');
  const navLearn = document.getElementById('nav-learn-topics');
  navLearn.innerHTML = LEARN_TOPICS.map(t => `
    <button class="nav-btn" id="nav-learn-${t.id}" onclick="navigate('learntopic','${t.id}')">
      <span class="ico">${t.icon}</span>
      <span class="ttl" style="font-size:11px">${t.title}</span>
    </button>`).join('');
  updateSidebar();
  updateApiDot();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const v = document.getElementById('view');
  if (state.view === 'dashboard')    v.innerHTML = renderDashboard();
  else if (state.view === 'module')  v.innerHTML = renderModule(ALL_MODULES.find(x => x.id === state.mid));
  else if (state.view === 'learnhub')  v.innerHTML = renderLearnHub();
  else if (state.view === 'learntopic') v.innerHTML = renderLearnTopic(LEARN_TOPICS.find(x => x.id === state.mid));
  else if (state.view === 'settings')  v.innerHTML = renderSettings();
  updateSidebar();
}

function renderDashboard() {
  const overall = getOverallProgress();
  const completed = ALL_MODULES.filter(m => getModuleProgress(m.id) === 100).length;
  const mcqsDone = ALL_MODULES.reduce((a, m) => a + Object.keys((progress[m.id] || {}).mcq || {}).length, 0);
  const mockDone = ALL_MODULES.reduce((a, m) => a + Object.keys((progress[m.id] || {}).mock || {}).length, 0);

  return `
  <div class="pg-head">
    <div class="ico">🏠</div>
    <div><h1>QA Interview Prep Hub</h1><p>Sivanandam Sivasubramanian — Test Manager / Sr. Automation Engineer</p></div>
  </div>
  <div class="content">
    ${overall >= 80 ? `<div class="ready-banner"><div class="trophy">🏆</div><div><h2>Interview Ready!</h2><p>You have completed ${overall}% of the curriculum. You are ready to interview.</p></div></div>` : ''}
    <div class="stats-row">
      <div class="stat-card p"><div class="stat-val">${overall}%</div><div class="stat-lbl">Overall Progress</div></div>
      <div class="stat-card s"><div class="stat-val">${completed}/${ALL_MODULES.length}</div><div class="stat-lbl">Modules Complete</div></div>
      <div class="stat-card w"><div class="stat-val">${mcqsDone}</div><div class="stat-lbl">MCQs Answered</div></div>
      <div class="stat-card"><div class="stat-val">${mockDone}</div><div class="stat-lbl">Mock Q&amp;As Done</div></div>
    </div>
    ${overall < 80 ? `<div class="card" style="background:#fef3c7;border-color:#fde68a;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">🎯</span>
        <div>
          <div style="font-weight:600;color:#92400e">Target: 80% to unlock Interview Ready status</div>
          <div style="font-size:12px;color:#78350f;margin-top:2px">You need ${80 - overall}% more progress. Keep going!</div>
        </div>
        <div style="margin-left:auto">
          <div class="pbar-wrap" style="width:200px;height:8px"><div class="pbar" style="width:${overall}%;background:#d97706"></div></div>
          <div style="font-size:11px;color:#92400e;text-align:right;margin-top:3px">${overall}% / 80%</div>
        </div>
      </div>
    </div>` : ''}
    <div class="card-title" style="font-size:16px;font-weight:700;color:#111827;margin-bottom:12px">📚 Curriculum Modules</div>
    <div class="mod-grid">
      ${ALL_MODULES.map(m => {
        const pct = getModuleProgress(m.id);
        const types = [m.mcqs?.length ? `<span class="badge bm">${m.mcqs.length} MCQ</span>` : '', m.mock?.length ? `<span class="badge bi">${m.mock.length} Mock</span>` : '', m.scenarios?.length ? `<span class="badge bs">${m.scenarios.length} Scenario</span>` : '', m.codeChallenge?.length ? `<span class="badge bc">${m.codeChallenge.length} Code</span>` : ''].filter(Boolean).join('');
        return `<div class="mod-card" onclick="navigate('module','${m.id}')">
          <div class="mod-card-hd"><div class="mod-card-ico">${m.icon}</div><div><div class="mod-card-ttl">${m.title}</div><div class="mod-card-meta">${m.desc}</div></div></div>
          <div class="pbar-wrap"><div class="pbar${pct===100?' done':''}" style="width:${pct}%"></div></div>
          <div class="plbl"><span>${pct}% complete</span>${pct===100?'<span style="color:#16a34a">✓ Done</span>':''}</div>
          <div class="badges">${types}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="text-align:center;margin-top:10px">
      <button class="btn btn-o btn-sm" onclick="if(confirm('Reset all progress?')){localStorage.removeItem('qaprep_progress');progress={};render()}">↺ Reset All Progress</button>
    </div>
  </div>`;
}

function renderModule(m) {
  const tabs = [
    ['topics','📖 Topics'], ['mcq','🧠 MCQ Quiz'],
    ['mock','🎤 Mock Interview'], ['scenario','🔍 Scenarios'],
    ...(m.codeChallenge ? [['code','💻 Code']] : [])
  ];
  const pct = getModuleProgress(m.id);
  return `
  <div class="pg-head">
    <div class="ico">${m.icon}</div>
    <div style="flex:1"><h1>${m.title}</h1><p>${m.desc}</p></div>
    <div style="text-align:right">
      <div style="font-size:22px;font-weight:800;color:${pct>=80?'#16a34a':'#2563eb'}">${pct}%</div>
      <div style="font-size:11px;color:#6b7280">module progress</div>
    </div>
  </div>
  <div class="content">
    <div class="tabs">${tabs.map(([t,l]) => `<button class="tab${state.tab===t?' active':''}" onclick="switchTab('${t}')">${l}</button>`).join('')}</div>
    ${state.tab==='topics' ? renderTopics(m) : ''}
    ${state.tab==='mcq' ? renderMCQ(m) : ''}
    ${state.tab==='mock' ? renderMock(m) : ''}
    ${state.tab==='scenario' ? renderScenario(m) : ''}
    ${state.tab==='code' && m.codeChallenge ? renderCode(m) : ''}
  </div>`;
}

function renderTopics(m) {
  return `<div class="card">
    <div class="card-title">📖 Key Topics to Master</div>
    <div class="topic-grid">${m.topics.map(t => `<div class="topic-item">${t}</div>`).join('')}</div>
  </div>
  <div class="card" style="background:#eff6ff;border-color:#bfdbfe">
    <div class="card-title">💡 Why This Module Matters for Your Role</div>
    <p style="font-size:13px;color:#1e40af;line-height:1.6">These topics map directly to your ${m.title} responsibilities at Impiger and your project experience. Interviewers will expect concrete examples from your BFSI (ABMF), OTT (Sun NXT), IoT (Titan/Noise), and CLM (PwC) work. Prepare 2-3 specific stories per major topic area.</p>
  </div>`;
}

function renderMCQ(m) {
  if (!m.mcqs?.length) return `<div class="card"><p class="text-gray">No MCQs for this module.</p></div>`;
  if (state.quizDone) {
    const total = m.mcqs.length;
    const correct = m.mcqs.filter((q,i) => state.quizAns[i] === q.ans).length;
    const pct = Math.round((correct/total)*100);
    const pass = pct >= 70;
    return `<div class="score-wrap">
      <div class="score-circle ${pass?'pass':'fail'}">${pct}%</div>
      <div style="font-size:18px;font-weight:700;color:#111827;margin-bottom:6px">${pass?'✅ Well done!':'📚 Keep practising'}</div>
      <div style="font-size:14px;color:#6b7280;margin-bottom:20px">${correct} / ${total} correct</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-p" onclick="state.quizIdx=0;state.quizAns={};state.quizDone=false;render()">↺ Retake Quiz</button>
        <button class="btn btn-o" onclick="switchTab('mock')">Next: Mock Interview →</button>
      </div>
    </div>
    <hr class="sep">
    ${m.mcqs.map((q,i) => {
      const sel = state.quizAns[i];
      const correct = sel === q.ans;
      return `<div class="q-card">
        <div class="q-num">Q${i+1} — ${correct?'✅ Correct':'❌ Incorrect'}</div>
        <div class="q-text">${q.q}</div>
        ${q.opts.map((o,j) => {
          let cls = 'opt';
          if (j === sel && j === q.ans) cls += ' correct';
          else if (j === sel) cls += ' wrong';
          else if (j === q.ans) cls += ' show-ok';
          return `<div class="${cls}"><div class="opt-ltr">${['A','B','C','D'][j]}</div>${o}</div>`;
        }).join('')}
        <div class="expl"><strong>Explanation:</strong> ${q.expl}</div>
      </div>`;
    }).join('')}`;
  }

  const idx = state.quizIdx;
  const q = m.mcqs[idx];
  const sel = state.quizAns[idx];
  const submitted = sel !== undefined;
  const correct = submitted && sel === q.ans;
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="q-num">Question ${idx+1} of ${m.mcqs.length}</div>
      <div class="pbar-wrap" style="width:180px"><div class="pbar" style="width:${((idx+1)/m.mcqs.length)*100}%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-num">Q${idx+1}</div>
      <div class="q-text">${q.q}</div>
      ${q.opts.map((o,j) => {
        let cls = 'opt';
        if (submitted) {
          if (j === sel && j === q.ans) cls += ' correct';
          else if (j === sel) cls += ' wrong';
          else if (j === q.ans) cls += ' show-ok';
        } else if (j === sel) cls += ' sel';
        const click = submitted ? '' : `onclick="state.quizAns[${idx}]=${j};render()"`;
        return `<div class="${cls}" ${click}><div class="opt-ltr">${['A','B','C','D'][j]}</div>${o}</div>`;
      }).join('')}
      ${submitted ? `<div class="expl"><strong>${correct?'✅ Correct!':'❌ Incorrect.'}</strong> ${q.expl}</div>` : ''}
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:6px">
      ${!submitted && sel !== undefined ? `<button class="btn btn-p" onclick="markMCQ('${m.id}',${idx},state.quizAns[${idx}]);render()">Submit Answer</button>` : ''}
      ${!submitted && sel === undefined ? `<button class="btn btn-p" disabled>Select an answer</button>` : ''}
      ${submitted && idx < m.mcqs.length-1 ? `<button class="btn btn-p" onclick="state.quizIdx=${idx+1};render()">Next Question →</button>` : ''}
      ${submitted && idx === m.mcqs.length-1 ? `<button class="btn btn-s" onclick="state.quizDone=true;render()">View Results 🏁</button>` : ''}
    </div>`;
}

function toggleAcc(id) {

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── CLAUDE API ──────────────────────────────────────────────────────────────
function getApiKey() { return localStorage.getItem('qaprep_claude_key') || ''; }
function saveApiKey(k) {
  localStorage.setItem('qaprep_claude_key', k.trim());
  updateApiDot();
}
function updateApiDot() {
  const dot = document.getElementById('api-dot');
  if (dot) dot.style.background = getApiKey() ? '#16a34a' : '#dc2626';
}

function isLocal() {
  return location.hostname === 'localhost' || location.hostname === '127.0.0.1';
}

async function callClaude(messages, systemPrompt) {
  const payload = { model: 'claude-opus-4-6', max_tokens: 1024, system: systemPrompt, messages };

  if (isLocal()) {
    // Local development: call Anthropic directly using the localStorage key
    const key = getApiKey();
    if (!key) throw new Error('NO_KEY');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${res.status}`);
    }
    const data = await res.json();
    return data.content[0].text;
  } else {
    // Hosted on Netlify: call the serverless proxy — API key stays server-side
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${res.status}`);
    }
    const data = await res.json();
    return data.content[0].text;
  }
}

// per-topic conversation history stored in memory (not persisted)
const learnChats = {};

function getChat(tid) {
  if (!learnChats[tid]) learnChats[tid] = [];
  return learnChats[tid];
}

function renderMsgs(tid) {
  const el = document.getElementById(`msgs-${tid}`);
  if (!el) return;
  const msgs = getChat(tid);
  el.innerHTML = msgs.map(m => `<div class="ai-msg ${m.role==='user'?'user':'ai'}">${escHtml(m.content)}</div>`).join('');
  el.scrollTop = el.scrollHeight;
}

function addThinking(tid) {
  const el = document.getElementById(`msgs-${tid}`);
  if (!el) return;
  const div = document.createElement('div');
  div.className = 'ai-msg thinking';
  div.id = `thinking-${tid}`;
  div.textContent = 'Claude is thinking…';
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function removeThinking(tid) {
  document.getElementById(`thinking-${tid}`)?.remove();
}

async function sendChat(tid) {
  const input = document.getElementById(`chat-${tid}`);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const topic = LEARN_TOPICS.find(t => t.id === tid);
  const chat = getChat(tid);
  chat.push({ role: 'user', content: text });
  renderMsgs(tid);
  addThinking(tid);
  try {
    const reply = await callClaude(
      chat.map(m => ({ role: m.role, content: m.content })),
      topic.aiContext
    );
    removeThinking(tid);
    chat.push({ role: 'assistant', content: reply });
    renderMsgs(tid);
  } catch(e) {
    removeThinking(tid);
    chat.push({ role: 'assistant', content: e.message === 'NO_KEY' ? 'Please add your Claude API key in Settings.' : `Error: ${e.message}` });
    renderMsgs(tid);
  }
}

async function sendQuick(tid, prompt) {
  const input = document.getElementById(`chat-${tid}`);
  if (input) input.value = prompt;
  await sendChat(tid);
}

async function generateExercise(tid) {
  const topic = LEARN_TOPICS.find(t => t.id === tid);
  const out = document.getElementById(`exercise-out-${tid}`);
  if (!out) return;
  out.style.display = 'block';
  out.textContent = 'Generating exercise…';
  try {
    const result = await callClaude(
      [{ role: 'user', content: `Generate a practical, hands-on exercise for a senior QA Manager to practise ${topic.title}. Include: a realistic scenario, specific tasks to complete, success criteria, and a sample solution. Keep it concise and actionable.` }],
      topic.aiContext
    );
    out.textContent = result;
  } catch(e) {
    out.textContent = e.message === 'NO_KEY' ? 'Please add your Claude API key in Settings first.' : `Error: ${e.message}`;
  }
}
