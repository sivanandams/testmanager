<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Interview Prep — Sivanandam S.</title>
<style>
:root{--p:#2563eb;--pl:#dbeafe;--s:#16a34a;--sl:#dcfce7;--w:#d97706;--wl:#fef3c7;--d:#dc2626;--dl:#fee2e2;--g1:#f9fafb;--g2:#f3f4f6;--g3:#e5e7eb;--g4:#d1d5db;--g5:#9ca3af;--g6:#6b7280;--g7:#374151;--g8:#1f2937;--g9:#111827;--sw:260px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--g1);color:var(--g8);min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:var(--g9);color:#fff;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.main{margin-left:var(--sw);flex:1}
.sb-head{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-head h2{font-size:15px;font-weight:700;color:#fff}
.sb-head p{font-size:11px;color:var(--g5);margin-top:2px}
.ring-wrap{padding:16px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.ring-wrap svg{display:block;margin:0 auto}
.ring-pct{font-size:22px;font-weight:800;color:#fff;line-height:1}
.ring-lbl{font-size:10px;color:var(--g5);margin-top:2px}
.ready-badge{margin:10px 12px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;text-align:center;display:none}
.nav-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--g6);padding:10px 16px 4px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;border-radius:6px;margin:1px 8px;font-size:12px;color:var(--g4);border:none;background:none;width:calc(100% - 16px);text-align:left;transition:background .15s}
.nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-btn.active{background:var(--p);color:#fff}
.nav-btn .ico{font-size:15px;flex-shrink:0}
.nav-btn .ttl{flex:1;line-height:1.3}
.nav-btn .pct{font-size:10px;background:rgba(255,255,255,.12);padding:2px 6px;border-radius:8px;flex-shrink:0}
.nav-btn.active .pct{background:rgba(255,255,255,.25)}
.pg-head{background:#fff;border-bottom:1px solid var(--g3);padding:18px 28px;display:flex;align-items:center;gap:10px}
.pg-head .ico{font-size:26px}
.pg-head h1{font-size:20px;font-weight:700;color:var(--g9)}
.pg-head p{font-size:13px;color:var(--g6);margin-top:2px}
.content{padding:22px 28px;max-width:900px}
.card{background:#fff;border:1px solid var(--g3);border-radius:10px;padding:18px;margin-bottom:14px}
.card-title{font-size:15px;font-weight:600;color:var(--g9);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:22px}
.mod-card{background:#fff;border:1px solid var(--g3);border-radius:10px;padding:18px;cursor:pointer;transition:all .2s}
.mod-card:hover{border-color:var(--p);box-shadow:0 4px 12px rgba(37,99,235,.1)}
.mod-card-hd{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.mod-card-ico{font-size:26px}
.mod-card-ttl{font-size:13px;font-weight:600;color:var(--g9);line-height:1.3}
.mod-card-meta{font-size:11px;color:var(--g5);margin-top:3px}
.pbar-wrap{height:5px;background:var(--g2);border-radius:3px;overflow:hidden;margin-bottom:6px}
.pbar{height:100%;border-radius:3px;background:var(--p);transition:width .4s}
.pbar.done{background:var(--s)}
.plbl{font-size:11px;color:var(--g5);display:flex;justify-content:space-between}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.4px}
.bm{background:#dbeafe;color:#1e40af}.bi{background:#f3e8ff;color:#6d28d9}.bs{background:#fef3c7;color:#92400e}.bc{background:#d1fae5;color:#065f46}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--g3);margin-bottom:18px}
.tab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--g5);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;border-radius:4px 4px 0 0;transition:all .15s}
.tab:hover{color:var(--p);background:var(--pl)}
.tab.active{color:var(--p);border-bottom-color:var(--p);font-weight:600}
.q-card{background:#fff;border:1px solid var(--g3);border-radius:10px;padding:20px;margin-bottom:14px}
.q-num{font-size:11px;font-weight:600;color:var(--p);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.q-text{font-size:15px;font-weight:500;color:var(--g9);margin-bottom:16px;line-height:1.5}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:2px solid var(--g3);border-radius:7px;margin-bottom:7px;cursor:pointer;font-size:13px;color:var(--g7);transition:all .15s}
.opt:hover{border-color:var(--p);background:var(--pl)}
.opt.sel{border-color:var(--p);background:var(--pl)}
.opt.correct{border-color:var(--s);background:var(--sl);color:var(--s)}
.opt.wrong{border-color:var(--d);background:var(--dl);color:var(--d)}
.opt.show-ok{border-color:var(--s);background:var(--sl);color:var(--s)}
.opt-ltr{font-weight:700;font-size:12px;min-width:20px;height:20px;border-radius:50%;background:var(--g3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt.correct .opt-ltr,.opt.show-ok .opt-ltr{background:var(--s);color:#fff}
.opt.wrong .opt-ltr{background:var(--d);color:#fff}
.expl{margin-top:14px;padding:10px 14px;background:var(--g1);border-left:4px solid var(--p);border-radius:0 7px 7px 0;font-size:12px;color:var(--g7);line-height:1.5}
.expl strong{color:var(--p)}
.btn{padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:#1d4ed8}.btn-p:disabled{background:var(--g4);cursor:not-allowed}
.btn-s{background:var(--s);color:#fff}.btn-s:hover{background:#15803d}
.btn-o{background:#fff;color:var(--p);border:2px solid var(--p)}.btn-o:hover{background:var(--pl)}
.btn-sm{padding:5px 12px;font-size:12px}
.score-wrap{text-align:center;padding:28px}
.score-circle{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:0 auto 14px;font-size:30px;font-weight:800}
.score-circle.pass{background:var(--sl);color:var(--s)}.score-circle.fail{background:var(--dl);color:var(--d)}
.mq-card{background:#fff;border:1px solid var(--g3);border-radius:10px;padding:20px;margin-bottom:14px}
.mq-hd{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.mq-num{background:var(--p);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.mq-txt{font-size:15px;font-weight:500;color:var(--g9);line-height:1.4;flex:1}
.mq-cat{font-size:10px;color:var(--g5);background:var(--g2);padding:2px 7px;border-radius:8px;flex-shrink:0}
textarea.ans{width:100%;min-height:120px;padding:10px;border:2px solid var(--g3);border-radius:7px;font-size:13px;font-family:inherit;color:var(--g8);resize:vertical;margin-bottom:10px;transition:border-color .15s}
textarea.ans:focus{outline:none;border-color:var(--p)}
.model-ans{background:var(--g1);border:1px solid var(--g3);border-radius:7px;padding:14px;margin-top:10px}
.model-ans h4{font-size:11px;font-weight:700;color:var(--s);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.model-ans p{font-size:13px;color:var(--g7);line-height:1.6}
.stars{display:flex;align-items:center;gap:6px;margin-top:10px}
.stars span{font-size:12px;color:var(--g6)}
.star{font-size:20px;cursor:pointer;border:none;background:none;color:var(--g4);transition:transform .1s}
.star:hover{transform:scale(1.2)}.star.on{color:#f59e0b}
.sc-box{background:var(--wl);border:1px solid #fde68a;border-radius:8px;padding:14px;font-size:13px;color:var(--g8);line-height:1.6;margin-bottom:14px}
.crit-list{list-style:none;margin:8px 0}
.crit-list li{display:flex;align-items:flex-start;gap:7px;font-size:13px;color:var(--g7);padding:5px 0;border-bottom:1px solid var(--g2);line-height:1.4}
.crit-list li::before{content:'✓';color:var(--s);font-weight:700;flex-shrink:0}
.ideal-box{background:var(--sl);border:1px solid #86efac;border-radius:7px;padding:14px;margin-top:12px;font-size:13px;color:var(--g7);line-height:1.6;display:none}
.code-block{background:var(--g9);color:#e5e7eb;border-radius:8px;padding:14px;font-family:'Courier New',monospace;font-size:12px;line-height:1.6;overflow-x:auto;margin:10px 0;white-space:pre}
.hint-box{background:#fefce8;border:1px solid #fde047;border-radius:7px;padding:10px 14px;margin:6px 0;font-size:12px;color:var(--g7)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--g3);border-radius:9px;padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:800;color:var(--g9)}
.stat-lbl{font-size:11px;color:var(--g5);margin-top:3px}
.stat-card.p .stat-val{color:var(--p)}.stat-card.s .stat-val{color:var(--s)}.stat-card.w .stat-val{color:var(--w)}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.topic-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--g7);padding:7px 10px;background:var(--g1);border-radius:5px}
.topic-item::before{content:'→';color:var(--p);font-weight:700}
.ready-banner{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border-radius:10px;padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.ready-banner .trophy{font-size:36px}
.ready-banner h2{font-size:18px;font-weight:700}
.ready-banner p{font-size:13px;opacity:.9;margin-top:2px}
.sep{border:none;border-top:1px solid var(--g3);margin:14px 0}
.flex{display:flex}.gap-2{gap:8px}.gap-3{gap:12px}.items-center{align-items:center}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.text-sm{font-size:12px}.text-gray{color:var(--g5)}.fw{font-weight:600}
.acc-hd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 14px;background:var(--g1);border-radius:7px;border:1px solid var(--g3);margin-bottom:6px;font-size:13px;font-weight:500;color:var(--g8)}
.acc-hd:hover{background:var(--g2)}
.acc-body{padding:0 14px 14px;border:1px solid var(--g3);border-top:none;border-radius:0 0 7px 7px;margin-top:-6px;margin-bottom:6px;display:none}
.done-chk{color:var(--s);font-size:15px;margin-left:auto}
@media(max-width:768px){.sidebar{width:200px}.main{margin-left:200px}.content{padding:14px}.stats-row{grid-template-columns:repeat(2,1fr)}.topic-grid{grid-template-columns:1fr}}
/* ── Learning Hub ── */
.learn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:22px}
.learn-card{background:#fff;border:1px solid var(--g3);border-radius:10px;padding:18px;cursor:pointer;transition:all .2s;position:relative}
.learn-card:hover{border-color:#7c3aed;box-shadow:0 4px 12px rgba(124,58,237,.12)}
.learn-card-ico{font-size:26px;margin-bottom:8px}
.learn-card-ttl{font-size:13px;font-weight:600;color:var(--g9);margin-bottom:4px}
.learn-card-sum{font-size:11px;color:var(--g6);line-height:1.4}
.learn-badge{position:absolute;top:12px;right:12px;font-size:10px;font-weight:700;background:#ede9fe;color:#6d28d9;padding:2px 7px;border-radius:8px;text-transform:uppercase}
.note-card{background:#fff;border:1px solid var(--g3);border-radius:10px;padding:16px;margin-bottom:10px}
.note-h{font-size:13px;font-weight:600;color:var(--g9);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.note-h::before{content:'';width:3px;height:14px;background:#7c3aed;border-radius:2px;flex-shrink:0}
.note-b{font-size:12px;color:var(--g7);line-height:1.6}
.ai-panel{background:#faf5ff;border:1px solid #e9d5ff;border-radius:10px;padding:16px;margin-top:16px}
.ai-panel-hd{font-size:13px;font-weight:600;color:#6d28d9;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ai-msgs{max-height:340px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}
.ai-msg{padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.6;max-width:88%}
.ai-msg.user{background:#7c3aed;color:#fff;align-self:flex-end;border-radius:8px 8px 2px 8px}
.ai-msg.ai{background:#fff;border:1px solid #e9d5ff;color:var(--g8);align-self:flex-start;border-radius:8px 8px 8px 2px;white-space:pre-wrap}
.ai-msg.thinking{background:#f3e8ff;color:#6d28d9;font-style:italic;align-self:flex-start}
.ai-input-row{display:flex;gap:8px}
.ai-input{flex:1;padding:9px 12px;border:1px solid #e9d5ff;border-radius:7px;font-size:12px;font-family:inherit;color:var(--g8);background:#fff}
.ai-input:focus{outline:none;border-color:#7c3aed}
.btn-ai{background:#7c3aed;color:#fff;border:none;border-radius:7px;padding:9px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-ai:hover{background:#6d28d9}.btn-ai:disabled{background:var(--g4);cursor:not-allowed}
.ai-quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.ai-quick{font-size:11px;padding:5px 10px;border-radius:12px;border:1px solid #e9d5ff;background:#fff;color:#6d28d9;cursor:pointer;font-weight:500;transition:all .15s}
.ai-quick:hover{background:#ede9fe;border-color:#7c3aed}
.key-missing{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:14px;font-size:12px;color:#92400e;text-align:center}
.settings-panel{background:#fff;border:1px solid var(--g3);border-radius:10px;padding:18px;margin-bottom:16px}
.settings-panel h3{font-size:14px;font-weight:600;color:var(--g9);margin-bottom:12px}
.api-input-row{display:flex;gap:8px;align-items:center}
.api-key-input{flex:1;padding:9px 12px;border:1px solid var(--g3);border-radius:7px;font-size:12px;font-family:monospace;color:var(--g8)}
.api-key-input:focus{outline:none;border-color:#7c3aed}
.api-status{font-size:11px;margin-top:8px;padding:6px 10px;border-radius:6px}
.api-status.ok{background:#dcfce7;color:#16a34a}.api-status.missing{background:#fee2e2;color:#dc2626}
.nav-lbl-learn{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#a78bfa;padding:10px 16px 4px}
.exercise-out{background:#1e1b4b;color:#e0e7ff;border-radius:8px;padding:14px;font-size:12px;line-height:1.6;margin-top:10px;white-space:pre-wrap;font-family:'Courier New',monospace;display:none}
</style>
</head>

    <h2>🎯 QA Interview Prep</h2>
    <p>Sivanandam S. — 16 yrs exp.</p>
  </div>
  <div class="ring-wrap">
    <svg width="90" height="90" viewBox="0 0 90 90">
      <circle cx="45" cy="45" r="38" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="8"/>
      <circle id="ring-circle" cx="45" cy="45" r="38" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" stroke-dasharray="239" stroke-dashoffset="239" transform="rotate(-90 45 45)" style="transition:stroke-dashoffset .6s"/>

<script>
const MODULES=[
{id:'m1',icon:'📋',title:'Test Management & QA Strategy',desc:'Test strategy, planning, estimation, governance & metrics',
topics:['Test Strategy vs Test Plan — key differences and when to use each','Risk-based testing: probability × impact prioritisation','Estimation techniques: WBS, Expert Judgment, Analogous, PERT','QA Governance frameworks: TaaS, CoE, Quality Charter','Quality metrics for management: DER, MTTR, Test Coverage, Automation ROI','Defect lifecycle, SLA management and triage process','Entry/exit criteria and quality gates per phase','Release sign-off and Go/No-Go decision frameworks'],
mcqs:[
{q:'What is the key difference between a Test Strategy and a Test Plan?',opts:['A Test Strategy is project-specific; a Test Plan is org-wide','A Test Strategy is a high-level org-wide approach document; a Test Plan is project-specific with detailed scope, schedule, and resources','A Test Strategy covers automation; a Test Plan covers manual only','There is no meaningful difference'],ans:1,expl:'Test Strategy: org-wide, methodology and principles. Test Plan: project-specific, contains scope, schedule, roles, entry/exit criteria, and risk — aligned to the strategy.'},
{q:'Which estimation technique is MOST reliable when you have data from 3 similar past BFSI projects?',opts:['Wide Band Delphi','Function Point Analysis','Analogous Estimation using historical actuals','PERT with 3-point estimates'],ans:2,expl:'Analogous estimation leverages historical actuals from comparable projects — fastest and most reliable when past data exists. With 16 years of project data, this is your strongest input.'},
{q:'3 days before a BFSI release, you find a critical module has 0% test coverage. Your FIRST action?',opts:['Start testing the module yourself immediately','Escalate to the CTO and request a delay','Conduct rapid risk assessment, map untested scenarios, present stakeholders with 3 options (delay/risk-based/risk acceptance) with trade-offs documented','Release and create a hotfix plan'],ans:2,expl:'Leadership response: diagnose → quantify risk → communicate transparently with options. Never hide a coverage gap, but also never escalate without a solution set ready.'},
{q:'Which metric is MOST impactful when presenting QA value to C-level stakeholders?',opts:['Total test cases executed','Defect Escape Rate — defects found in production as % of total defects','Number of automation scripts','Daily execution %'],ans:1,expl:'DER directly links QA effectiveness to business risk. A low DER means QA is protecting the business from production failures — a language executives understand.'},
{q:'In a TaaS engagement, what is the MOST critical governance element?',opts:['Size of the test case repository','Clearly defined SLAs, quality thresholds, and transparent real-time reporting dashboards','Whether the team is onshore or offshore','The automation framework stack'],ans:1,expl:'TaaS accountability rests on measurable, agreed SLAs and visible dashboards. Without these, the client cannot assess value and trust erodes.'},
{q:'Risk-based testing is BEST applied when:',opts:['All features are equally important','Time and resources are constrained and you need to maximise coverage of high-impact areas','You have unlimited time to test everything','All defects have the same severity'],ans:1,expl:'Risk-based testing prioritises by probability-of-failure × business-impact. Critical for financial transactions, auth flows, and data integrity — exactly the scenarios in ABMF and BFSI projects.'},
{q:'Standard entry criteria for System Testing includes:',opts:['Development team verbal sign-off only','Unit + integration tests passed, stable environment, test data ready, test cases reviewed, traceability matrix approved','At least 50% of test cases written','Automation framework set up'],ans:1,expl:'Entry criteria ensure testing starts on a stable, prepared baseline. Missing any of these leads to environment churn and wasted test cycles.'},
{q:'How do you manage QA effort allocation across 5 concurrent projects?',opts:['Distribute equally','Prioritise by revenue impact, risk level, release proximity, and compliance requirements — backed by utilisation data','Give resources to whoever asks loudest','Focus only on the newest project'],ans:1,expl:'Data-driven allocation: business criticality + risk + timeline + regulatory weight. This is standard for a Test Manager running multiple TaaS accounts simultaneously.'}
],
mock:[
{q:'Walk me through how you define a test strategy for a new BFSI project.',cat:'Strategy',ans:'I start with business and regulatory context — RBI guidelines, PCI-DSS, data localisation for BFSI. I analyse system architecture to identify test layers: functional, integration, performance, security, regression. I set automation candidacy criteria — targeting 70-80% regression coverage with Playwright. Risk-based prioritisation is defined upfront: financial transactions, auth, and encryption get the highest focus. I establish a metrics framework (DER, coverage %, automation ROI) and a governance model with weekly stakeholder dashboards and fortnightly steering reviews. For ABMF specifically, we structured testing around investor journeys — purchase, redemption, portfolio view — with VAPT on all data endpoints.'},
{q:'How do you estimate QA effort for a complex enterprise project you have not worked on before?',cat:'Estimation',ans:'I use a multi-technique approach. First, WBS-based requirements decomposition: for each feature, I estimate test design, execution cycles, defect retest, and automation development. I apply complexity buffers — new domain or tech stack adds 20-30%. I cross-check with analogous estimates from similar past projects. For automation, initial build costs 3-5x manual execution time but pays back after 3-5 runs — I factor in long-term ROI. I identify team ramp-up time for new domains. I present estimates with confidence levels and explicit assumptions — so stakeholders understand what the buffer is for.'},
{q:'How do you ensure quality in a continuous delivery environment where releases happen weekly?',cat:'CI/CD Quality',ans:'I embed quality gates at every pipeline stage: PR-level static analysis and unit tests, commit-level smoke tests (Playwright, ~5 min), nightly full regression with parallel execution. I define mandatory quality thresholds — no merge if critical test fails, DER above threshold blocks release. I create a shift-left practice where QA reviews requirements and design before dev starts. For weekly releases, I rely on automation coverage — 80% regression via Playwright means human effort focuses only on exploratory and new feature testing. Release decision is data-driven via a live dashboard, not gut feel.'}
],

mcqs:[
{q:'You manage 50+ QA engineers across 3 time zones. What is the MOST effective alignment strategy?',opts:['Daily meeting at your local time','Overlap hours for live collaboration, async-first norms, shared dashboards, rotating meeting times to distribute inconvenience fairly','Require offshore to work onshore hours','Communicate only via email'],ans:1,expl:'Distributed team success: defined overlap windows, async-first with clear SLAs, real-time dashboards (Azure DevOps/JIRA), and rotating inconvenient slots so no one location bears all the burden.'},
{q:'A senior QA engineer with domain expertise is consistently missing deadlines and seems disengaged. First step?',opts:['Issue a formal warning','Private 1:1 to understand root cause — burnout, personal issue, skill mismatch, or lack of challenge','Reassign all their tasks','Report to HR immediately'],ans:1,expl:'Performance issues in experienced engineers are usually symptoms: burnout, feeling undervalued, or role misalignment. Diagnose before prescribing. The conversation is private, empathetic, and solution-oriented.'},
{q:'You need to transition QA ownership from a client team to your offshore team. Best approach?',opts:['Ask for documents and start testing immediately','Structured KT: shadowing → reverse shadowing → parallel execution → full handover with success milestones','Start fresh with your own processes','Take automation ownership only'],ans:1,expl:'Phased transition builds client trust: shadow (learn), reverse shadow (execute while observed), parallel run (validate parity), then full handover. Each phase has sign-off criteria.'},
{q:'How do you build automation skills in a team that is 90% manual testers?',opts:['Hire all new automation engineers and exit manual testers','Identify willing learners, create structured upskilling with paired automation work, dedicated practice time, and celebrate early wins','Buy a codeless tool and expect the team to figure it out','Outsource all automation'],ans:1,expl:'Skill transformation: find motivated learners (not force everyone), pair with automation engineers, protect practice time from project pressure, celebrate first scripts publicly. Retains domain knowledge while building technical depth.'},
{q:'A dev lead repeatedly disputes your team\'s critical severity ratings. How do you resolve this structurally?',opts:['Escalate to CTO every time','Agree with the dev lead to maintain peace','Establish a shared severity matrix agreed upfront by QA, Dev, and PM leads — unresolved cases escalate to a neutral stakeholder','Stop raising critical defects'],ans:2,expl:'Remove personality from severity discussions by creating objective criteria both sides agreed to. Escalation path to a neutral party (PM or Product Owner) handles edge cases without the conversation becoming personal.'},
{q:'Your team is at 100% capacity and a new urgent project arrives. What do you do?',opts:['Accept and overload the team','Decline the project','Analyse utilisation data, identify efficiency gains from automation on existing projects, explore contractor options, and present leadership with data-backed options and timeline trade-offs','Ask the team to work weekends'],ans:2,expl:'Never accept an impossible commitment. Show data: current utilisation, what releasing capacity would require, contractor cost vs timeline trade-off. Let leadership make the call with full information.'},
{q:'Demonstrating QA as a value driver (not cost centre) to business stakeholders requires:',opts:['Writing more test cases','Quantifying cost of defects prevented vs cost of QA investment, showing automation ROI, and linking DER to customer experience metrics','Working longer hours','Reducing team size to cut costs'],ans:1,expl:'Business language: cost of quality (prevention vs failure), automation ROI (hours saved × loaded cost), production incident reduction. When QA is framed as risk management, it becomes a strategic investment.'},
{q:'What does an effective mid-year performance review for a QA engineer look like?',opts:['Review test cases and bug count only','Against pre-agreed SMART goals covering technical depth, quality impact metrics, collaboration, and professional development — with 360 feedback and forward-looking development plan','Only give feedback if there are problems','Base it entirely on manager observation'],ans:1,expl:'Effective reviews: SMART goals set at start of period, evidence-based with specific examples, multi-dimensional (technical, impact, collaboration, growth), two-way dialogue, and clear development plan for next period.'}

{q:'Tell me about managing a QA team of 50+ people. What were your biggest challenges?',cat:'Leadership',ans:'At Impiger I managed 50+ QA engineers across onshore/offshore locations for 15+ concurrent projects. Key challenges: (1) Consistency — different leads had different quality bars. Fixed with a QA Centre of Excellence: shared templates, peer review process, and monthly calibration sessions. (2) Visibility at scale — I could not be everywhere. Implemented Azure DevOps dashboards per project with RAG status and a weekly lead review cadence. (3) Career stagnation — junior testers felt stuck. Created skill tracks: Manual → Automation → Performance/Security, with training support and ISTQB certification budget. (4) Cross-timezone communication — established async standups, bi-weekly live syncs with rotating times, and a clear escalation path. Key insight: at this scale, your processes and systems do the management — not you personally.'},
{q:'Describe a situation where you influenced a major decision without formal authority.',cat:'Influence',ans:'The Playwright migration at PwC. Dev team and PM were resistant — they saw risk and rework. I had no authority to mandate it. My approach: (1) Built a POC: migrated 20 legacy scripts, showed 60% execution speed improvement and 0% vs 40% flakiness. (2) Quantified ROI: projected 200+ hours saved per quarter in reduced debugging and reruns. (3) Framed it in business terms for the Project Director — faster feedback cycles, lower maintenance cost, better CI integration. (4) Proposed phased approach — new tests in Playwright first, no forced migration of working scripts. Director approved. Lesson: influence without authority requires data, business framing, the right sponsor, and a low-risk entry point.'},
{q:'How do you handle ongoing conflict between your QA team and the development team?',cat:'Conflict',ans:'I address conflict at the structural level, not the personality level. Steps I have used: (1) Well-documented defects with reproduction steps, env details, expected vs actual — removes ambiguity. (2) Pre-agreed severity matrix so classification is against criteria, not opinion. (3) Fortnightly cross-team defect review sessions where QA and Dev review defects together — this builds mutual respect and surfaced root causes quickly. (4) Retrospectives that include both teams — "how do we find bugs earlier together?" reframes QA from gate-keeper to partner. At one BFSI engagement, these changes reduced defect disputes by 70% within 2 sprints.'}
],

topics:['Playwright vs legacy frameworks — architecture advantages','Page Object Model (POM) with Playwright Python','conftest.py patterns — fixtures, scoping, session auth','Auto-wait and expect() assertions vs standard assert','Network interception and API mocking with page.route()','Visual regression testing with playwright snapshots','API testing via page.request context','Mobile/device emulation for responsive testing','Parallel execution with pytest-xdist','CI/CD integration: Azure DevOps, Jenkins pipelines','Playwright MCP and AI-assisted test generation','Handling iframes, shadow DOM, dynamic content'],
mcqs:[
{q:'What is Playwright\'s primary architectural advantage over legacy browser automation frameworks?',opts:['Playwright is easier to install','Playwright communicates via CDP/WebSocket natively, providing auto-wait, built-in network interception, cross-browser support from one API, and first-class support for modern JS app patterns','Playwright supports only Chromium','Playwright does not need a browser driver'],ans:1,expl:'Playwright uses the Chrome DevTools Protocol (CDP) and browser-native WebSocket connections — giving it direct control without driver intermediaries. This enables auto-waiting (no explicit waits needed), native network mocking, and much faster execution than WebDriver-based tools.'},
{q:'In pytest-playwright, what does the `page` fixture provide and what is its default scope?',opts:['A URL loader, session-scoped','A pre-configured browser page (tab) for each test, automatically cleaned up after — function-scoped by default','A shared page across all tests in a module','A file reader for test data'],ans:1,expl:'The `page` fixture creates browser → context → page for each test function and tears down after. Function scope (default) gives test isolation. Use `context` fixture when you need to share state across tests in a class.'},
{q:'How do you interact with elements inside an iframe in Playwright?',opts:['Use driver.switch_to.frame() like older frameworks','Use page.frame_locator("iframe#myFrame").locator("button#submit").click()','Playwright cannot interact with iframes','Execute JavaScript to extract iframe content'],ans:1,expl:'Playwright\'s frame_locator() returns a frame context you chain regular locators onto: `page.frame_locator("#payment-frame").get_by_role("button", name="Pay").click()`. Cleaner than switch-based patterns and handles nested frames naturally.'},
{q:'What is the BEST locator strategy priority order in Playwright?',opts:['XPath always, it is the most powerful','data-testid first, then role/label-based (get_by_role, get_by_label), then text, then CSS — avoid structure-coupled selectors','CSS class names first','Full XPath from root element'],ans:1,expl:'Playwright testing guide priority: (1) data-testid — stable across UI refactors, (2) Accessibility role/label — semantically correct, (3) Text — readable, (4) CSS — use last resort. `page.get_by_role("button", name="Submit")` is preferred over `.btn-submit` CSS.'},
{q:'How do you mock an API response to return a 500 error for error-state UI testing?',opts:['You cannot mock API responses in Playwright','Set up a separate WireMock server','Use page.route("**/api/portfolio**", lambda route: route.fulfill(status=500, json={"error":"Server Error"})) BEFORE navigation','Use page.wait_for_response() and modify it'],ans:2,expl:'page.route() intercepts matching requests. route.fulfill() returns mock data. CRITICAL: the route must be registered BEFORE the navigation that triggers the API call. Use route.abort() to simulate network failure, route.continue_() to pass through with modifications.'},
{q:'What is the key advantage of Playwright\'s expect() assertions over Python\'s standard assert?',opts:['expect() is faster to type','expect() automatically retries the assertion until it passes or the timeout expires — making tests resilient to async UI updates','Standard assert is deprecated in Python','expect() only works with Playwright locators'],ans:1,expl:'`expect(locator).to_be_visible()` retries for up to 5 seconds (configurable). `assert element.is_visible()` checks once and fails if the UI has not updated yet. This single change eliminates most flakiness from async rendering.'},
{q:'How do you persist authentication state across tests to avoid logging in before every test?',opts:['Store credentials in test code and log in each time','Use context.storage_state(path="auth.json") after a session login, then load it via browser.new_context(storage_state="auth.json") for subsequent tests','There is no way to share auth state in Playwright','Use cookies directly in each test'],ans:1,expl:'storage_state() serialises cookies and localStorage. One login per test run, state reused across all tests. Major performance win — a 200-test suite that logs in each time vs once is dramatically faster.'},
{q:'How do you run Playwright tests in parallel in Azure DevOps CI?',opts:['Playwright does not support parallel execution','Run pytest with -n auto (pytest-xdist) and ensure tests are isolated with function-scoped page fixtures, or use Azure DevOps parallel jobs with test sharding','Create separate VMs for each test','Use Python threading inside test code'],ans:1,expl:'pytest -n 4 distributes tests across 4 workers. Test isolation is critical: each test must use its own page/context (function-scoped). In Azure DevOps, combine pytest-xdist with --dist=loadbalance for optimal CI utilisation. Use --tracing=retain-on-failure for debugging CI failures.'},
{q:'You need to test the portfolio page on an iPhone 14 form factor. How do you configure this?',opts:['Playwright cannot test mobile viewports','Use browser.new_context(**playwright.devices["iPhone 14"]) to emulate viewport, user agent, touch, and device scale factor','Manually set window size with page.set_viewport_size()','Use a separate Appium setup for this'],ans:1,expl:'playwright.devices["iPhone 14"] is a descriptor with viewport, user agent, device pixel ratio, touch, and mobile flag pre-configured. Accurate responsive testing without physical devices for web apps. For native iOS apps, you would still need Appium.'}
],
mock:[
{q:'Walk me through the Playwright framework architecture you built for the ABMF project.',cat:'Framework Design',ans:'The ABMF framework had clear layers. (1) Page Objects: one class per page — Login, Dashboard, InvestorPortfolio, Transactions. Locators as instance attributes using get_by_role and get_by_label for accessibility alignment. Actions as methods returning self for chaining. (2) Fixtures in conftest.py: session-scoped browser, session-scoped authenticated context using storage_state, function-scoped auth_page for test isolation. (3) Configuration: environment variables for base_url, credentials, and API keys — never hardcoded. pytest.ini for global timeout and base_url. (4) Test data: factory pattern — create via API before test, delete after via yield fixture. (5) Reporting: Allure with auto-captured screenshots and traces on failure. (6) CI: Azure DevOps pipeline — smoke suite on every PR, full regression nightly with parallel workers. Result: 80% automation coverage, 50% regression time reduction.'},
{q:'How have you integrated Playwright MCP and AI tools into your testing workflow?',cat:'AI-Assisted Testing',ans:'I use Playwright MCP as an agent that receives natural language user journey descriptions and executes them against the live app, generating base test code. The AI gets 70-80% of the way — I then refine for stability, reusability, and edge cases. With Claude Code, I provide the page HTML structure and ask for the POM class — it is strong at fixture patterns and parametrised tests. GitHub Copilot fills in repetitive assertion patterns in VS Code. The discipline I enforce: AI generates, human validates — every AI-generated test must demonstrably fail when the feature is broken before I trust it. This approach reduced script development time by ~40% on the PwC CLM project. The risk to call out: AI-generated tests can be over-confident — they pass even when the app has subtle bugs if the assertions are not precise enough.'},
{q:'How do you approach migrating a flaky Selenium framework to Playwright?',cat:'Migration',ans:'I never recommend a big-bang rewrite. My phased approach used at PwC: Phase 1 — root cause analysis of flakiness, categorising into: timing issues (fix with Playwright auto-wait), fragile locators (fix with role-based selectors), test data dependency (fix with API-based setup), environment instability (fix with better isolation). Phase 2 — write all new tests in Playwright immediately, no new Selenium scripts. Phase 3 — migrate highest-ROI flaky Selenium tests first: those that fail most often in CI and block releases. Measure weekly: flakiness rate, execution time, coverage. Phase 4 — retire stable Selenium tests only after Playwright equivalents pass 10 consecutive CI runs. Set a target: below 2% flakiness rate in the new framework before declaring migration complete.'}
],

codeChallenge:[
{title:'POM Class for Login Page',desc:'Write a Playwright Python POM class for a login page with username, password, submit button, and error message. Include locators, login() method, and assertion helpers.',
hints:['Use get_by_label() or get_by_role() — not CSS class selectors','Accept page: Page in __init__','Return self from action methods for chaining','Use Playwright expect() for assertions — not standard assert'],
solution:`# pages/login_page.py
from playwright.sync_api import Page, expect

class LoginPage:
    def __init__(self, page: Page):
        self.page = page
        self.username  = page.get_by_label("Username")
        self.password  = page.get_by_label("Password")
        self.submit    = page.get_by_role("button", name="Sign In")
        self.error_msg = page.get_by_role("alert")

    def navigate(self, base_url: str):
        self.page.goto(f"{base_url}/login")
        return self

    def login(self, username: str, password: str):
        self.username.fill(username)
        self.password.fill(password)
        self.submit.click()
        return self

    def expect_error(self, text: str):
        expect(self.error_msg).to_be_visible()
        expect(self.error_msg).to_contain_text(text)

    def expect_login_success(self):
        expect(self.page).not_to_have_url("**/login")

# tests/test_login.py
def test_valid_login(page, base_url):
    LoginPage(page).navigate(base_url).login("user@test.com","Pass123")
                   .expect_login_success()

def test_wrong_password(page, base_url):
    LoginPage(page).navigate(base_url).login("user@test.com","wrong")
                   .expect_error("Invalid credentials")`,
expl:'Key patterns: (1) Role/label locators — stable across UI refactors. (2) Method chaining with return self — readable test code. (3) expect() for auto-retrying assertions. (4) Assertion helpers in the POM — tests read like requirements.'},
{title:'API Mocking for Error State Testing',desc:'Write a Playwright test that intercepts /api/portfolio, returns a 500 error, and verifies the UI shows a user-friendly error with a retry button.',
hints:['page.route() must be called BEFORE the navigation that triggers the API call','Use route.fulfill() to return mock status and body','route.abort() simulates a network failure (different from 500)','Test both the error message text AND the retry button presence'],
solution:`def test_portfolio_shows_error_on_api_failure(page, base_url):
    # MUST be registered before navigation
    page.route(
        "**/api/portfolio**",
        lambda route: route.fulfill(
            status=500,
            content_type="application/json",
            body='{"error":"PORTFOLIO_LOAD_FAILED"}'
        )
    )
    page.goto(f"{base_url}/portfolio")

    error = page.get_by_role("alert")
    expect(error).to_be_visible()
    expect(error).to_contain_text("Unable to load portfolio")
    expect(page.get_by_role("button", name="Try Again")).to_be_visible()

def test_portfolio_empty_state(page, base_url):
    page.route("**/api/portfolio**", lambda route: route.fulfill(
        status=200,
        content_type="application/json",
        body='{"holdings":[],"totalValue":0}'
    ))
    page.goto(f"{base_url}/portfolio")
    expect(page.get_by_text("No investments found")).to_be_visible()`,
expl:'route.fulfill() returns your mock. route.abort() simulates network failure. route.continue_() passes through with optional modifications. Wildcard ** matches any path prefix. This eliminates separate mock servers for edge case testing.'}
]}
];

{id:'m4',icon:'⚡',title:'Performance & Security Testing',desc:'JMeter, K6, OWASP ZAP, Burp Suite — strategy to execution',
topics:['Performance test types: load, stress, soak, spike, endurance','JMeter test plan structure: thread groups, samplers, listeners','K6 scripting: virtual users, scenarios, thresholds','Performance metrics: response time (p95/p99), throughput, error rate','Bottleneck identification: backend vs DB vs network','OWASP Top 10 (2021) — key vulnerabilities to know cold','Burp Suite: Proxy, Scanner, Intruder, Repeater usage','OWASP ZAP for automated security scanning','VAPT report writing and remediation guidance','Security testing for APIs: auth bypass, injection, IDOR'],
mcqs:[
{q:'What is the difference between Load Testing and Stress Testing?',opts:['They are the same','Load testing validates performance under expected peak load; stress testing pushes beyond limits to find breaking points and failure modes','Load testing is for APIs; stress testing is for UI','Stress testing is done before load testing always'],ans:1,expl:'Load test: validate system meets SLAs at expected concurrency (e.g. 5000 concurrent users for ABMF market hours). Stress test: find the breaking point — when does it degrade and how does it recover? Both are necessary for BFSI platforms.'},
{q:'Which K6 metric should you set as a threshold for a financial transaction API?',opts:['Average response time only','p95 response time (95th percentile) < 2000ms AND error rate < 0.5% — protecting the majority of users while catching tail latency','Maximum response time','Requests per second only'],ans:1,expl:'p95/p99 are better than average — averages hide tail latency that affects real users. For financial transactions, a strict error rate threshold is non-negotiable. Setting both response time AND error thresholds is production-grade practice.'},
{q:'During a load test for a mutual fund portal (target: 10,000 concurrent users), response times degrade at 3,000 users. What is your FIRST diagnostic step?',opts:['Immediately increase server capacity','Analyse which specific transaction types are degrading — database query times, application server CPU, or network bandwidth','Reduce the user count in the test','Declare the test a failure and stop'],ans:1,expl:'Bottleneck localisation: use JMeter listeners or K6 output to identify which endpoints degrade. Cross-reference with APM data (application CPU, DB slow query logs, connection pool exhaustion). Fix the root cause, not the symptom.'},
{q:'Which OWASP Top 10 (2021) vulnerability is MOST critical for a BFSI investor portal?',opts:['A5: Security Misconfiguration','A1: Broken Access Control — allowing an investor to view or modify another investor\'s portfolio','A9: Security Logging Failures','A10: Server-Side Request Forgery'],ans:1,expl:'Broken Access Control (A1 in OWASP 2021) is the #1 risk. For BFSI: an investor accessing another\'s portfolio (IDOR), a distributor accessing admin functions, or privilege escalation. This has direct financial and regulatory consequences.'},
{q:'How do you test for SQL Injection in a login form using Burp Suite?',opts:['Test only with valid credentials','Intercept the login request in Burp Proxy, send to Repeater, inject payloads like \' OR 1=1-- in username/password fields, observe responses for errors or auth bypass','Use OWASP ZAP Scanner only','You cannot test SQL injection on login forms'],ans:1,expl:'Burp Repeater: capture login POST, inject SQL payloads, observe: (1) Database error messages (vulnerability confirmed + information leak), (2) Successful auth bypass (critical), (3) Time delays with SLEEP() payloads (blind SQLi). Also test API endpoints — not just UI forms.'},
{q:'What should a VAPT report include for a financial platform client?',opts:['Just a list of vulnerabilities found','Executive summary with business risk, detailed findings with severity (CVSS score), proof of concept/evidence, affected endpoints, and prioritised remediation steps','Only critical vulnerabilities','A generic security checklist'],ans:1,expl:'A VAPT report has two audiences: (1) Executive — business risk, impact, compliance implication. (2) Technical — reproduction steps, affected code/endpoint, CVSS score, and specific remediation. Prioritise by exploitability × impact. Include retest plan.'},
{q:'In K6, how do you simulate a realistic ramp-up of users for a load test?',opts:['Set all virtual users from start','Use stages in options: [{duration:"2m",target:100},{duration:"5m",target:1000},{duration:"3m",target:1000},{duration:"2m",target:0}] to gradually ramp up, sustain, and ramp down','K6 does not support gradual ramp-up','Use a single thread group setting'],ans:1,expl:'Staged ramp-up mimics real traffic patterns. Ramping up slowly lets you observe the inflection point where performance degrades. Sustain phase validates steady-state behaviour. Ramp-down validates graceful recovery. Sudden full-load tests are useful for stress testing only.'},
{q:'What is the difference between OWASP ZAP and Burp Suite in a QA security testing workflow?',opts:['They are identical tools','OWASP ZAP is open-source and well-suited for automated scanning in CI/CD pipelines; Burp Suite Professional is better for manual exploratory security testing, with advanced tools like Intruder and active scanner','Burp Suite is free; ZAP is paid','ZAP tests only APIs; Burp tests only web apps'],ans:1,expl:'ZAP integrates into CI/CD via CLI/API — automated baseline scans on every build catch regressions. Burp Pro is used by security specialists for deep manual testing — Intruder for fuzzing, Scanner for active crawling, Repeater for manual payload crafting. Use both: automated baseline + manual deep dive.'}
],
mock:[
{q:'Walk me through your approach to performance testing the ABMF mutual fund portal for a market-open event expecting 10x normal traffic.',cat:'Performance Strategy',ans:'I start with understanding the SLAs — what response times and error rates are acceptable during market hours. For ABMF, financial transactions had a 2-second p95 SLA and 0% error tolerance. I then profiled baseline performance under normal load, identified the critical user journeys (portfolio view, buy/sell order, NAV refresh), and designed a test plan with: (1) Baseline at expected normal load, (2) Load test at projected market-open peak, (3) Stress test to find the breaking point, (4) Soak test at peak for 2 hours to catch memory leaks. I used JMeter for test execution with BlazeMeter for cloud scale. Key finding: at 3x normal load, the portfolio aggregation DB query hit a bottleneck. We added a caching layer and the portal sustained 10x load within SLA. I also set up JMeter MCP Server to run load tests in the CI pipeline for regression performance checks.'},
{q:'Describe your VAPT process for the PwC CLM platform — what did you look for and how did you report it?',cat:'Security Testing',ans:'For a contract lifecycle platform handling sensitive legal data, I followed OWASP Top 10 as my framework. I started with reconnaissance: mapping all API endpoints using Swagger docs and Burp\'s spider, then checked authentication flows for JWT weaknesses — algorithm confusion, token expiry bypass. I tested for IDOR by manipulating contract IDs in API requests — checking if user A could access user B\'s contracts. I ran OWASP ZAP automated baseline scan for quick wins: missing security headers, verbose error messages, insecure CORS. Then deep manual testing with Burp on the contract upload and approval workflows — checking for stored XSS, file upload bypass, and privilege escalation. The report had an executive section with a risk heat map, and a technical section with CVSS-scored findings, PoC evidence, affected endpoints, and prioritised remediation steps. All critical findings were retested after fixes were deployed.'}
],

title:'BFSI Portal Under Attack: Production SQLi Vulnerability Reported',
setup:'Two weeks after your ABMF go-live, the security team reports a potential SQL injection vulnerability in the investor search endpoint. A penetration tester found that the endpoint reflects database error messages when certain characters are submitted. You are responsible for QA.',
criteria:['Immediate triage: is this exploitable? What data is at risk?','Reproduce the finding in a safe environment (not production)','Assess scope: are other endpoints affected?','Coordinate with dev on immediate mitigation — WAF rule or parameter sanitisation','Verify the fix before re-enabling the endpoint','Conduct a targeted security review of all input handling endpoints','Include a process question: how did this pass VAPT?'],
ideal:'Reproduce in staging using Burp Repeater with the exact payload. Confirm exploitability level (error-based vs blind vs full data extraction). Coordinate with dev: (1) Immediate: WAF rule to block the payload pattern, (2) Fix: parameterised queries or ORM enforcement, (3) Test: verify fix eliminates the error message AND that legitimate searches still work. Scope scan with ZAP across all search/filter endpoints. RCA: was this endpoint in scope during VAPT? If missed, update the test charter. Report formally with timeline, impact assessment, and fix verification.'
}],
codeChallenge:[{
title:'K6 Load Test Script for a Fund Purchase API',
desc:'Write a K6 script to load test a mutual fund purchase API endpoint. Include: realistic ramp-up stages, authentication header, success/failure checks, and p95 threshold.',
hints:['Import http and check from k6','Define stages in export const options','Use check() to validate response status and response body','Set thresholds for http_req_duration (p95) and http_req_failed rate'],
solution:`import http from 'k6/http';
import { check, sleep } from 'k6';

export const options = {
  stages: [
    { duration: '2m', target: 100 },   // ramp up
    { duration: '5m', target: 1000 },  // sustained peak
    { duration: '2m', target: 2000 },  // stress beyond peak
    { duration: '2m', target: 0 },     // ramp down
  ],
  thresholds: {
    http_req_duration: ['p(95)<2000'],  // 95% under 2s
    http_req_failed:   ['rate<0.005'],  // <0.5% errors
  },
};

const BASE_URL = __ENV.BASE_URL || 'https://staging.abmf.com';
const TOKEN    = __ENV.API_TOKEN;

export default function () {
  const payload = JSON.stringify({
    schemeCode: 'INF200K01RD8',
    amount: 5000,
    investorId: \`INV_\${Math.floor(Math.random() * 1000)}\`,
    transactionType: 'PURCHASE',
  });

  const params = {
    headers: {
      'Content-Type': 'application/json',
      'Authorization': \`Bearer \${TOKEN}\`,
    },
  };

  const res = http.post(\`\${BASE_URL}/api/transactions/purchase\`, payload, params);

  check(res, {
    'status is 201':          (r) => r.status === 201,
    'transaction id present': (r) => r.json('transactionId') !== undefined,
    'response time < 2s':     (r) => r.timings.duration < 2000,
  });

  sleep(1); // think time between requests
}`,
expl:'Key patterns: (1) Staged ramp-up — observe degradation inflection point. (2) Thresholds fail the test automatically if SLAs are breached — CI/CD integration. (3) check() records pass/fail per assertion for detailed reporting. (4) Random investorId simulates realistic distribution, not hammering one account. (5) sleep(1) models realistic user think time.'}
]},

{id:'m5',icon:'🔗',title:'API Testing (Postman & Karate DSL)',desc:'API test strategy, Postman collections, Karate framework, contract testing',
topics:['REST API concepts: methods, status codes, auth patterns (OAuth2, JWT, API key)','Postman: collections, environments, pre-request scripts, test scripts','Newman: running Postman collections in CI/CD','Karate DSL: feature file syntax, scenarios, schema validation','API contract testing: what it is and why it matters','GraphQL API testing considerations','API security testing: auth bypass, IDOR, rate limiting','Test data management for API tests','Mocking dependencies with Postman Mock Servers','API performance baselines with Karate Gatling'],
mcqs:[
{q:'What is the purpose of a Postman pre-request script?',opts:['To delete test data after the test','To execute JavaScript before the request is sent — typically for generating dynamic values, setting variables, or refreshing auth tokens','To validate the response body','To set environment variables permanently'],ans:1,expl:'Pre-request scripts run before the request. Common uses: (1) Generate timestamp or UUID for request body, (2) Refresh OAuth token if expired, (3) Compute HMAC signature for signed APIs, (4) Set up dependent data. This keeps collections dynamic and self-sufficient.'},
{q:'In a Postman test script, how do you validate that a JSON response contains a specific field?',opts:['pm.response.text().includes("fieldName")','pm.test("field exists", () => { pm.expect(pm.response.json()).to.have.property("transactionId"); })','console.log(pm.response.json())','pm.response.json().fieldName !== null'],ans:1,expl:'pm.test() wraps assertions with a name (shown in results). pm.expect() uses Chai-style assertions — .to.have.property(), .to.equal(), .to.be.an("array"), .to.have.lengthOf(). Always name your tests — unnamed assertions are invisible in Newman reports.'},
{q:'How do you chain Postman requests so Request B uses a value from Request A\'s response?',opts:['You cannot chain requests in Postman','In Request A\'s test script: pm.environment.set("tokenId", pm.response.json().id). Then use {{tokenId}} in Request B\'s URL or body','Copy-paste the value manually between requests','Use a separate scripting tool outside Postman'],ans:1,expl:'Environment/collection variables bridge requests. Pattern: (1) Request A runs and extracts a value into a variable. (2) Request B references {{variableName}} in URL, headers, or body. This is how you test flows like: login → get token → use token to purchase → verify transaction.'},
{q:'What is API contract testing and why does it matter in a microservices architecture?',opts:['Testing that the API documentation is formatted correctly','Verifying that the API consumer and provider agree on the exact request/response schema — preventing breaking changes from one service from silently breaking another','Testing API performance under load','Testing API security headers only'],ans:1,expl:'Contract testing (e.g. Pact framework) catches integration failures early — before services are deployed together. The consumer defines what it expects, the provider verifies it delivers that. Critical in microservices where teams deploy independently and a changed response schema can break downstream consumers silently.'},
{q:'In Karate DSL, how do you validate that an API response matches a JSON schema?',opts:['Karate cannot validate JSON schemas','Use match response == {id: #number, name: #string, status: #? _ == "ACTIVE" || _ == "PENDING"} inline in the feature file','Write a separate Java validator class','Use an external JSON schema library'],ans:1,expl:'Karate\'s `match` keyword with type markers (#string, #number, #array, #present) provides inline schema validation without external libraries. `#? expression` allows custom predicates. This makes API schema validation readable and maintainable alongside the test scenario.'},
{q:'When running Postman collections in CI/CD, what tool do you use and what is the key configuration?',opts:['Postman desktop app only','Newman CLI: newman run collection.json -e environment.json --reporters cli,junit --reporter-junit-export results.xml — the JUnit reporter enables Azure DevOps/Jenkins to parse results','Postman cloud sync only','A custom bash script calling the Postman API'],ans:1,expl:'Newman is Postman\'s CLI runner. Key flags: -e for environment file, --reporters for output format, --reporter-junit-export for CI integration. JUnit format is universally parsed by Azure DevOps, Jenkins, and GitHub Actions. Run newman in a pipeline step after deploy to staging.'},
{q:'How do you test for Insecure Direct Object Reference (IDOR) vulnerabilities in an API?',opts:['Only test with your own account credentials','Authenticate as User A, capture a resource ID (e.g. investorId=1234), then make the same API call authenticated as User B with User A\'s ID — if successful, IDOR is confirmed','Run the standard automated scanner only','Test only GET endpoints, not POST'],ans:1,expl:'IDOR testing requires two test accounts. Log in as User B, attempt to access/modify User A\'s resources by substituting IDs. Test across all CRUD operations — read IDOR is bad, write IDOR is critical. For financial platforms, IDOR on transactions or portfolio data is a regulatory compliance failure.'},
{q:'What is the advantage of Karate DSL over Postman for large-scale API test automation?',opts:['Karate has a better UI','Karate integrates natively with Java/Maven ecosystems, runs in CI without additional CLI tools, supports data-driven testing with external files, and can combine API testing with performance testing via Karate Gatling','Postman has no scripting capability','Karate is faster to set up initially'],ans:1,expl:'Karate DSL advantages at scale: (1) Native Maven/Gradle integration — runs as part of the build, (2) Feature file syntax is readable without coding, (3) Built-in schema validation and fuzzy matching, (4) Karate Gatling for performance testing with the same scenarios, (5) Parallel execution out of the box. Best for projects that need programmatic flexibility beyond Postman collections.'}
],
mock:[
{q:'How did you structure API testing for the ABMF investor portal?',cat:'API Strategy',ans:'The ABMF portal had a layered API testing strategy. At the unit level, backend teams owned contract tests verifying request/response schemas. At the integration level, I used Postman collections organised by domain: authentication, investor management, transaction processing, and portfolio reporting. Each collection had environment files for dev/staging/prod, with pre-request scripts to refresh OAuth tokens and generate test transaction IDs. Newman ran these collections in the Azure DevOps pipeline after every staging deployment — about 180 API tests completing in under 3 minutes. For security, I separately ran IDOR tests across all investor-facing endpoints using two test investor accounts. We also used Karate for the more complex transaction flow tests where we needed data-driven testing with multiple scheme codes and amounts — Karate\'s table-driven syntax was cleaner than Postman for that.'},
{q:'How do you ensure API tests do not create test pollution — leftover data that affects subsequent tests?',cat:'Test Data Management',ans:'Test data isolation is enforced at the fixture level. For each test suite, I create all required data via API calls before the test, capture the created resource IDs, run the tests, then delete the data in teardown. In Postman, this means a pre-request script that calls a setup endpoint and stores the created ID as a collection variable, and a folder-level test script that calls a cleanup endpoint. In Karate, yield-style setup/teardown via Background and Hooks. For stateful workflows (like a multi-step transaction), I use a dedicated test environment that is reset nightly via an automated seed script. The principle: every test run should be idempotent — you can run it 10 times and get the same result without manual cleanup.'}
],
scenarios:[{
title:'API Breaking Change Deployed to Staging — Integration Tests All Failing',
setup:'Your team\'s Postman/Newman CI pipeline suddenly has 60% failures after a backend team deployed a service update to staging. The error pattern shows unexpected response schema changes — fields renamed and a nested object flattened. You were not notified of the breaking change.',
criteria:['Triage: identify the exact schema changes causing failures','Differentiate intentional breaking changes from bugs','Communicate with the backend team immediately — was this planned?','Assess downstream impact: which consumers are affected beyond your tests','Advocate for a contract testing process to prevent recurrence','Update tests to match new schema if change is legitimate and approved','Establish a change notification process for shared API contracts'],
ideal:'Run a diff on the response schema between last green build and current. List all breaking changes with affected test names. Raise with backend team: (1) If unintentional — revert or hotfix. (2) If intentional — the process failed: breaking changes need advance notice, versioning, and consumer coordination. Update Postman tests to new schema. Propose introducing Pact contract tests so provider changes are validated against consumer expectations before deployment. Establish API change notification in the team working agreement.'
}],
codeChallenge:[{
title:'Karate DSL Feature File for Fund Purchase API',
desc:'Write a Karate DSL feature file that: authenticates via OAuth, purchases a mutual fund, and validates the response schema. Include a data-driven table for multiple scenarios.',
hints:['Use Background for shared setup (auth token)','Use * def for variables','Use match response contains for partial schema validation','Use Examples table for data-driven scenarios'],
solution:`Feature: Mutual Fund Purchase API

  Background:
    * url baseUrl
    * def authToken = call read('auth.js') { username: '#(testUser)', password: '#(testPass)' }
    * header Authorization = 'Bearer ' + authToken

  Scenario Outline: Purchase fund scheme <schemeCode> with amount <amount>
    Given path '/api/transactions/purchase'
    And request
      """
      {
        "schemeCode": "<schemeCode>",
        "amount": <amount>,
        "investorId": "#(investorId)",
        "transactionType": "PURCHASE"
      }
      """
    When method POST
    Then status 201
    And match response ==
      """
      {
        "transactionId": "#string",
        "status":        "#? _ == 'PENDING' || _ == 'CONFIRMED'",
        "schemeCode":    "<schemeCode>",
        "amount":        <amount>,
        "timestamp":     "#string",
        "nav":           "#number"
      }
      """
    And match response.transactionId == "#present"

    Examples:
      | schemeCode      | amount |
      | INF200K01RD8    | 5000   |
      | INF204K01234    | 10000  |
      | INF179K01GRW    | 1000   |

  Scenario: Purchase with insufficient balance returns 400
    Given path '/api/transactions/purchase'
    And request { schemeCode: 'INF200K01RD8', amount: 9999999, investorId: '#(investorId)', transactionType: 'PURCHASE' }
    When method POST
    Then status 400
    And match response.errorCode == 'INSUFFICIENT_BALANCE'`,
expl:'Key patterns: (1) Background centralises auth setup. (2) call read() for reusable auth scripts. (3) match with #string, #number type markers for schema validation without hardcoding values. (4) #? predicate for enum validation. (5) Examples table makes data-driven tests clean and readable.'}
]},

{id:'m6',icon:'🔄',title:'Agile & DevOps QA',desc:'Shift-left testing, quality gates in CI/CD, sprint ceremonies, release governance',
topics:['Shift-left testing: what it means and how to implement it','Quality gates at each CI/CD pipeline stage','Sprint QA practices: story kickoffs, three amigos, DoD','Definition of Done from a QA perspective','Test environment strategy in DevOps (ephemeral envs, IaC)','Release management: feature flags, canary releases, blue-green','Azure DevOps for QA: pipelines, test plans, dashboards','Exploratory testing in Agile contexts','Continuous testing metrics and quality dashboards','Managing technical test debt'],
mcqs:[
{q:'What does "shift-left testing" mean in practice for a QA Manager?',opts:['Moving the QA team\'s desks to the left side of the office','Engaging QA in requirements review, design walkthroughs, and test case creation before development begins — finding defects earlier when they cost 10x less to fix','Starting regression testing earlier in the sprint','Automating tests before writing them manually'],ans:1,expl:'Shift-left = move quality activities earlier in the SDLC. QA reviews requirements for testability, participates in three-amigos sessions, creates test cases from acceptance criteria during sprint planning, and runs static analysis in the development phase. Defects found in requirements cost ~1/10th of defects found in production.'},
{q:'Which quality gates should be mandatory at the PR (pull request) stage in a CI pipeline?',opts:['Full regression suite','Unit tests pass, static code analysis (linting, SAST) green, code coverage threshold met, and no new critical security findings — all under 5 minutes','Manual QA sign-off','End-to-end UI tests'],ans:1,expl:'PR gates must be fast (<5 min) to avoid developer friction. Unit tests + linting + coverage threshold + quick SAST scan. End-to-end tests belong in post-merge/staging pipelines. If PR gates are too slow, developers bypass them — as seen in the slow Playwright suite scenario.'},
{q:'What is the Three Amigos meeting and what is the QA lead\'s role in it?',opts:['A team-building exercise','A refinement session involving the BA, Developer, and QA lead to clarify a user story — QA surfaces edge cases, asks "what happens when...?" questions, and agrees acceptance criteria before dev starts','A sprint retrospective format','A daily standup variant'],ans:1,expl:'Three Amigos (BA + Dev + QA) happens before a story is worked. QA\'s role: (1) Ask edge case questions the BA and Dev may not think of, (2) Confirm acceptance criteria are testable, (3) Agree on test scenarios that will prove the story is done. This prevents late surprises — "I didn\'t know QA needed that field" — and is core to BDD-style development.'},
{q:'How do you define "Done" for a user story from a QA perspective?',opts:['Developer has committed the code','Code committed + unit tests pass + QA acceptance tests pass + no open critical defects + automation updated + exploratory testing signed off + documented in test plan','QA has written the test cases','The story is in staging'],ans:1,expl:'A robust QA-inclusive DoD: code + unit tests + functional acceptance tests + automation coverage updated + no open Sev1/Sev2 defects + exploratory session completed + performance impact assessed if applicable. DoD prevents stories that are "mostly done" from clogging releases.'},
{q:'A developer argues that QA involvement in sprint ceremonies slows down the team. How do you respond?',opts:['Agree and withdraw from ceremonies','Withdraw from retrospectives but stay in planning','Present data: stories that go through Three Amigos have 40-60% fewer defects in QA and take less total time (requirement rework avoided). QA in ceremonies is investment, not overhead','Escalate to the Scrum Master'],ans:2,expl:'The "QA slows us down" argument is answered with data on defect cost of requirements vs code phase. Earlier QA involvement reduces total cycle time even if it appears to add meeting time. Frame it as: "we are preventing 3-day bug investigations by spending 20 minutes in kickoff."'},
{q:'What is the purpose of feature flags in a DevOps release strategy from a QA perspective?',opts:['Feature flags are only for developers','Feature flags allow new features to be deployed to production but kept hidden — enabling QA to test in production with real data while users see the old behaviour, and enabling instant rollback without deployment','Feature flags replace the need for testing','Feature flags are the same as environment variables'],ans:1,expl:'Feature flags decouple deployment from release. QA benefits: (1) Test in production-like conditions with real infrastructure and data, (2) Gradual rollout (canary) to real users while monitoring, (3) Instant disable if a defect is found — no deployment needed. This is how BFSI and OTT platforms release continuously without big-bang risk.'},
{q:'How do you measure the health of a continuous testing pipeline?',opts:['Count the number of tests only','Track: test execution time trend, flakiness rate (<2% target), pipeline success rate, mean time to detect a regression, and automation coverage change per sprint','Track only pass/fail numbers','Count defects found per sprint'],ans:1,expl:'Continuous testing health metrics: (1) Execution time trend — is it growing unsustainably? (2) Flakiness rate — above 5% signals a problem. (3) Pipeline success rate — how often does CI green mean actually green? (4) MTTD — how quickly do tests catch a regression after commit? (5) Coverage trend — is automation growing with the product?'},
{q:'What is your approach to managing test environment drift in a multi-team product with frequent deployments?',opts:['Manually track environment configurations in a spreadsheet','Implement Infrastructure as Code (IaC with Terraform/Helm) for environment provisioning, use ephemeral environments per feature branch, and establish environment health checks in the pipeline before test execution','Accept that environments will drift and retest when issues occur','Ask DevOps to manage it entirely'],ans:1,expl:'Environment drift is a leading cause of "works on my machine" failures and flaky tests. IaC ensures environments are provisioned identically from code. Ephemeral envs per PR eliminate shared environment conflicts. Pre-test environment health checks catch configuration issues before wasting test execution time.'}
],
mock:[
{q:'How do you embed QA into an Agile team without creating a QA bottleneck at the end of the sprint?',cat:'Agile QA',ans:'The bottleneck pattern happens when QA is treated as a gate at the end — dev finishes on day 8, QA has 2 days. I eliminate this through three practices. First, parallel working: QA writes test cases from acceptance criteria on day 1 while dev designs, so I am testing as soon as a story is technically ready rather than waiting for batch delivery. Second, developer self-testing: I work with the team to ensure devs run the existing automated smoke suite before handing over — QA gets stable builds, not first-pass code. Third, continuous integration of test results: rather than a "QA phase," test results are visible to the whole team throughout the sprint. When I implemented this at a 12-person scrum team for ABMF, stories that used to arrive in the last 3 days of sprint started arriving on day 4-5, and our sprint completion rate went from 65% to 88%.'},
{q:'Describe how you set up and govern quality gates in an Azure DevOps CI/CD pipeline.',cat:'DevOps QA',ans:'I structure pipeline quality gates in four stages. Stage 1 — PR pipeline (under 5 min): unit tests, linting, SAST scan, code coverage threshold. Blocks merge if any fail. Stage 2 — Post-merge pipeline to dev environment (under 15 min): smoke suite (Playwright, ~50 critical tests), API contract tests (Newman), integration tests. Stage 3 — Staging pipeline (nightly + on-demand): full Playwright regression, security baseline scan (OWASP ZAP), performance regression check (K6 baseline). Stage 4 — Pre-production gate: manual exploratory sign-off, release checklist, DER check against threshold. In Azure DevOps, I use Environments with Approvals for Stage 4 — the pipeline cannot proceed to production without a named approver (QA lead + product owner). I publish test results as JUnit XML and use Test Plans for traceability between requirements and test execution.'}
],
scenarios:[{
title:'Dev Team Wants to Remove Regression Testing from Each Sprint to Go Faster',
setup:'In a sprint retrospective, the development team proposes removing the regression testing cycle from each sprint. They argue it slows releases, most regression issues are caught by unit tests, and the team should move to continuous delivery without a regression gate. You are the QA Manager.',
criteria:['Do not simply refuse — engage with the legitimate concern about speed','Present data on what regression testing has historically caught that unit tests missed','Propose a solution: shift to risk-based regression + automation, not elimination','Offer to reduce regression time with better automation coverage and parallelism','Agree on measurable success criteria for the new approach','Establish a trial period with monitoring','Protect the business risk acceptance conversation being done consciously'],
ideal:'Validate the concern first — if regression takes 3 days manually, that IS a problem. Counter with data: show defects caught in regression that unit tests missed (integration, UI, end-to-end flows). Propose: (1) Automated regression via Playwright runs in the pipeline unattended — zero sprint capacity. (2) Manual regression only for new features and high-risk areas — time-boxed. (3) Risk-based selection: not all 400 tests every sprint. Agree to a 2-sprint trial with defect metrics as success criteria. Frame it as: "let\'s make regression invisible through automation, not eliminate the safety net."'
}],
